<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Soltri 선생산 관리</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="data_wr.js" onerror="console.log('data_wr.js 없음 - Google Sheets에서 로드')"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

.top-bar{background:linear-gradient(135deg,#1e293b,#334155);padding:16px 24px;border-bottom:2px solid #3b82f6;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:20px;color:#f8fafc}
.top-bar h1 em{font-style:normal;color:#3b82f6}
.top-bar .sub{font-size:12px;color:#94a3b8;margin-top:2px}
.top-bar .actions{display:flex;gap:8px}

.filter-bar{background:#1a2540;border-bottom:1px solid #334155;padding:10px 24px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.fi{display:flex;align-items:center;gap:7px;font-size:12px}
.fi label{color:#94a3b8;white-space:nowrap}
.fi input[type=range]{width:90px;accent-color:#3b82f6;cursor:pointer}
.fi input[type=number]{width:64px;background:#334155;border:1px solid #475569;color:#e2e8f0;border-radius:4px;padding:3px 7px;font-size:12px}
.fv{font-weight:800;color:#3b82f6;min-width:28px;text-align:right}
.filter-div{width:1px;height:20px;background:#334155}
.btn-sel{background:#0f2a1a;border:1px solid #22c55e;color:#4ade80;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-weight:600}
.btn-sel:hover{background:#1a3d28}
.btn-clr{background:#2a1f0f;border:1px solid #f59e0b;color:#fbbf24;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-weight:600}
.btn-clr:hover{background:#3d2e10}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-print{background:#059669;color:#fff}
.btn-print:hover{background:#047857}
.btn-reset{background:#475569;color:#e2e8f0}
.btn-reset:hover{background:#64748b}
.btn-undo{background:#f59e0b;color:#1a1a1a}
.btn-undo:hover{background:#d97706}
.btn-refresh{background:#3b82f6;color:#fff}
.btn-refresh:hover{background:#2563eb}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px}
.stat{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #334155;text-align:center}
.stat .num{font-size:28px;font-weight:800}
.stat .lbl{font-size:11px;color:#94a3b8;margin-top:2px}
.stat.danger .num{color:#ef4444}
.stat.warn .num{color:#f59e0b}
.stat.ok .num{color:#22c55e}
.stat.info .num{color:#3b82f6}

.section{padding:8px 24px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;user-select:none}
.section-header h2{font-size:16px;font-weight:700}
.section-header .badge{padding:2px 10px;border-radius:10px;font-size:13px;font-weight:700}
.section-header .toggle{font-size:12px;color:#64748b;margin-left:auto}

.section.active .section-header h2{color:#ef4444}
.section.active .badge{background:#ef444433;color:#f87171}
.section.graveyard .section-header h2{color:#64748b}
.section.graveyard .badge{background:#47556933;color:#94a3b8}
.section.stocked .section-header h2{color:#22c55e}
.section.stocked .badge{background:#22c55e33;color:#4ade80}
.section.producing .section-header h2{color:#3b82f6}
.section.producing .badge{background:#3b82f633;color:#60a5fa}
.section.completed .section-header h2{color:#a78bfa}
.section.completed .badge{background:#7c3aed33;color:#c4b5fd}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:8px}

.card{background:#1e293b;border:2px solid #334155;border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{border-color:#3b82f6;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.card.sent{opacity:.35;pointer-events:none;border-color:#334155}
.card.sending{animation:sendAnim .4s ease-out forwards}

@keyframes sendAnim{
  0%{transform:scale(1);opacity:1}
  50%{transform:scale(.95);opacity:.5}
  100%{transform:scale(.9)translateY(10px);opacity:0}
}
@keyframes reviveAnim{
  0%{transform:scale(.9);opacity:0}
  100%{transform:scale(1);opacity:1}
}

.card .row1{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card .chisu{font-size:20px;font-weight:800;flex:1}
.card .jaejil-badge{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;color:#fff}
.jaejil-CN10{background:#b8860b}
.jaejil-RS40{background:#0d9488}
.jaejil-CM20{background:#6b7280}

.card .row2{display:flex;gap:16px;font-size:13px;color:#94a3b8}
.card .row2 strong{color:#e2e8f0}

.card .stock-bar{margin-top:8px;height:6px;background:#334155;border-radius:3px;overflow:hidden}
.card .stock-fill{height:100%;border-radius:3px;transition:width .3s}
.stock-fill.danger{background:#ef4444}
.stock-fill.warn{background:#f59e0b}
.stock-fill.ok{background:#22c55e}

.card .stock-label{display:flex;justify-content:space-between;font-size:11px;margin-top:3px;color:#64748b}
.card .stock-label .stock-num{font-weight:800;font-size:14px}
.card .timeline{position:relative;height:8px;background:#1e293b;border-radius:4px;margin-top:6px;border:1px solid #334155}
.card .timeline .dot{position:absolute;width:5px;height:5px;border-radius:50%;background:#3b82f6;top:50%;transform:translateY(-50%)}
.card .timeline .dot.recent{background:#f59e0b}
.card .timeline .dot.balju{background:#ef4444;width:7px;height:7px;z-index:2;box-shadow:0 0 4px #ef4444}
.card .timeline-label{display:flex;justify-content:space-between;font-size:8px;color:#475569;margin-top:1px}
.card .timeline-label .mid{position:absolute;left:50%;transform:translateX(-50%)}
.card .stock-label .stock-num.danger{color:#ef4444}
.card .stock-label .stock-num.warn{color:#f59e0b}
.card .stock-label .stock-num.ok{color:#22c55e}

.card .action-hint{position:absolute;top:0;right:0;bottom:0;width:60px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:20px;background:linear-gradient(90deg,transparent,#ef444444)}
.card:hover .action-hint{opacity:1}
.card .card-btns{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .2s;z-index:10}
.card:hover .card-btns{opacity:1}
.card .card-btn{background:#334155;border:1px solid #475569;color:#94a3b8;font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer}
.card .card-btn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6}
.card .card-btn.excel{color:#22c55e;border-color:#22c55e44}
.card .card-btn.excel:hover{background:#22c55e;color:#fff}
.card .card-btn.excel.selected{background:#22c55e;color:#fff;opacity:1}

.card-grave .action-hint{background:linear-gradient(90deg,transparent,#22c55e44)}

.empty-msg{text-align:center;padding:40px;color:#475569;font-size:14px}

.search-bar{background:#0f1d32;border-bottom:1px solid #334155;padding:8px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-bar input[type=text]{background:#334155;border:1px solid #475569;color:#e2e8f0;border-radius:6px;padding:6px 12px;font-size:13px;width:160px}
.search-bar input[type=text]::placeholder{color:#64748b}
.search-bar select{background:#334155;border:1px solid #475569;color:#e2e8f0;border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer}
.search-bar .btn-search{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer}
.search-bar .btn-search:hover{background:#2563eb}
.search-bar .search-results{font-size:11px;color:#64748b}
.card.highlight{border-color:#f59e0b!important;box-shadow:0 0 20px rgba(245,158,11,.4)!important;animation:highlightPulse 1.5s ease-out}
@keyframes highlightPulse{0%{box-shadow:0 0 30px rgba(245,158,11,.6)}100%{box-shadow:0 0 20px rgba(245,158,11,.4)}}

.sort-btn{background:#334155;border:1px solid #475569;color:#94a3b8;font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;margin-left:8px;font-weight:600}
.sort-btn:hover{background:#475569;color:#e2e8f0}
.sort-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}

/* ── Dashboard ── */
.dash-toggle{background:#6366f1;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.dash-toggle:hover{background:#4f46e5}
.dashboard{padding:0 24px 12px;display:none}
.dashboard.show{display:block}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dash-panel{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px 18px;overflow:hidden}
.dash-panel h3{font-size:13px;color:#94a3b8;margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.dash-panel.full{grid-column:1/-1}

/* Pipeline */
.pipeline{display:flex;align-items:center;gap:0;margin:8px 0}
.pipe-stage{flex:1;text-align:center;position:relative;padding:14px 8px;border-radius:8px}
.pipe-stage .pipe-num{font-size:32px;font-weight:800;line-height:1}
.pipe-stage .pipe-lbl{font-size:11px;margin-top:4px;opacity:.8}
.pipe-stage .pipe-sub{font-size:10px;margin-top:2px;opacity:.5}
.pipe-arrow{font-size:20px;color:#475569;flex-shrink:0;padding:0 2px}

/* Bars */
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.hbar-label{width:52px;text-align:right;color:#94a3b8;flex-shrink:0;font-weight:600}
.hbar-track{flex:1;height:22px;background:#334155;border-radius:4px;overflow:hidden;position:relative}
.hbar-fill{height:100%;border-radius:4px;transition:width .4s;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;min-width:fit-content}
.hbar-val{margin-left:8px;color:#94a3b8;font-size:11px;flex-shrink:0;width:32px}

/* Stacked bar */
.stacked-bar{display:flex;height:28px;border-radius:6px;overflow:hidden;margin-bottom:4px}
.stacked-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:width .4s}
.stacked-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px}
.stacked-legend span{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8}
.stacked-legend .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Urgent table */
.urgent-table{width:100%;font-size:12px;border-collapse:collapse}
.urgent-table th{text-align:left;color:#64748b;padding:4px 8px;font-size:10px;text-transform:uppercase;border-bottom:1px solid #334155}
.urgent-table td{padding:6px 8px;border-bottom:1px solid #1e293b22}
.urgent-table tr:hover{background:#334155}
.urgent-table .u-chisu{font-weight:700;color:#f8fafc}
.urgent-table .u-score{font-weight:800;color:#ef4444}
.urgent-table .u-stock{font-weight:700}
.urgent-table .u-badge{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;color:#fff}
.urgent-table .clickable{cursor:pointer}
.urgent-table .clickable:hover{color:#3b82f6}

/* Progress ring */
.progress-ring-wrap{display:flex;align-items:center;gap:20px}
.progress-ring{position:relative;width:100px;height:100px;flex-shrink:0}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring .ring-bg{fill:none;stroke:#334155;stroke-width:8}
.progress-ring .ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s}
.progress-ring .ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:800}
.progress-detail{font-size:12px;color:#94a3b8;line-height:2}
.progress-detail strong{color:#e2e8f0}

/* Jaejil colors */
.jc-CN10{background:#b8860b}
.jc-RS40{background:#0d9488}
.jc-CM20{background:#6b7280}
.jc-CN20{background:#7c3aed}
.jc-other{background:#475569}

/* History log table */
.hist-log{width:100%;font-size:12px;border-collapse:collapse}
.hist-log th{text-align:left;color:#64748b;padding:6px 10px;font-size:10px;text-transform:uppercase;border-bottom:1px solid #334155;cursor:pointer;user-select:none;white-space:nowrap}
.hist-log th:hover{color:#e2e8f0}
.hist-log td{padding:6px 10px;border-bottom:1px solid #1e293b33}
.hist-log tr:hover{background:#334155}
.hist-log .st-grave{color:#f59e0b;font-weight:700}
.hist-log .st-done{color:#22c55e;font-weight:700}
.hist-log .days{color:#3b82f6;font-weight:700;text-align:right}
.hist-summary{display:flex;gap:20px;margin-top:10px;font-size:12px;color:#94a3b8;flex-wrap:wrap}
.hist-summary strong{color:#e2e8f0}

@media(max-width:768px){
  .dash-grid{grid-template-columns:1fr}
  .dash-panel.full{grid-column:1}
}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;padding:10px 24px;border-radius:8px;font-size:13px;color:#e2e8f0;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#1e293b;border:2px solid #3b82f6;border-radius:12px;width:90%;max-width:600px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #334155}
.modal-header h3{font-size:18px;color:#f8fafc}
.modal-header .close-btn{background:none;border:none;color:#94a3b8;font-size:24px;cursor:pointer}
.modal-header .close-btn:hover{color:#fff}
.modal-body{overflow-y:auto;padding:0}
.history-table{width:100%;border-collapse:collapse;font-size:13px}
.history-table th{background:#334155;color:#e2e8f0;padding:8px 12px;text-align:left;position:sticky;top:0;font-size:12px}
.history-table td{padding:8px 12px;border-bottom:1px solid #1e293b;color:#cbd5e1}
.history-table tr:nth-child(even){background:#162032}
.history-table tr:hover{background:#1e3a5f}
.history-table .qty{text-align:right;font-weight:700;color:#f59e0b}
.modal-loading{padding:40px;text-align:center;color:#64748b}
.history-tip{padding:8px 16px;font-size:11px;color:#64748b;border-top:1px solid #334155;text-align:center}

@media print{
  .no-print{display:none!important}
  body{background:#fff;color:#1a1a1a}
  .top-bar{background:#fff;border-bottom:2px solid #1e3a5f;position:static}
  .top-bar h1{color:#1e3a5f}
  .stat{border-color:#ddd}
  .stat .num{color:#1a1a1a!important}
  .card{border-color:#ddd;break-inside:avoid}
  .section.graveyard{display:none}
  .card .chisu{color:#1a1a1a}
  .card .row2{color:#666}
  .card .row2 strong{color:#1a1a1a}
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1><em>Soltri</em> W/R 선생산 관리</h1>
    <div class="sub">공통: 100일간 반복주문 · 재고 30% 이하 · 7일내 미생산 &nbsp;│&nbsp; G1: 8회+ 총량≤500 (부족분 생산) &nbsp;│&nbsp; G2: 13회+ 총량≤1,000 (최대 500개)</div>
  </div>
  <div class="actions no-print">
    <button class="dash-toggle" onclick="toggleDashboard()">대시보드</button>
    <button class="btn btn-refresh" onclick="refreshCheck()">리프레시</button>
    <button class="btn" style="background:#22c55e;color:#fff;display:none" onclick="downloadExcel()" id="btnExcel">엑셀 다운로드 (<span id="excelCount">0</span>)</button>
    <button class="btn btn-undo" onclick="undoLast()" id="btnUndo" style="display:none">되돌리기</button>
    <button class="btn btn-reset" onclick="resetAll()">초기화</button>
    <button class="btn btn-print" onclick="window.print()">인쇄</button>
  </div>
</div>

<div class="filter-bar">
  <button class="btn-sel" id="btnAll" onclick="setGroup('all')" style="background:#1e293b;border:1px solid #3b82f6;color:#60a5fa">모두</button>
  <button class="btn-sel" id="btnG1" onclick="setGroup('g1')" style="background:#1e293b;border:1px solid #3b82f6;color:#60a5fa">G1 (8+/≤500)</button>
  <button class="btn-sel" id="btnG2" onclick="setGroup('g2')" style="background:#1e293b;border:1px solid #f59e0b;color:#fbbf24">G2 (13+/≤1000)</button>
  <div class="filter-div"></div>
  <div class="fi"><label>주문횟수 ≥</label>
    <input type="range" id="fFreq" min="1" max="50" value="8" oninput="applyFilter()">
    <span class="fv" id="fFreqVal">8</span><span style="color:#64748b;font-size:11px">회</span>
  </div>
  <div class="filter-div"></div>
  <div class="fi"><label>재고율 ≤</label>
    <input type="range" id="fStock" min="0" max="100" value="30" oninput="applyFilter()">
    <span class="fv" id="fStockVal">30</span><span style="color:#64748b;font-size:11px">%</span>
  </div>
  <div class="filter-div"></div>
  <div class="fi"><label>총량 ≤</label>
    <input type="number" id="fQty" min="1" max="9999" value="500" oninput="applyFilter()">
    <span style="color:#64748b;font-size:11px">개</span>
  </div>
  <div class="filter-div"></div>
  <button class="btn-sel" onclick="selectAllActive()">전체 선택 →엑셀</button>
  <button class="btn-clr" onclick="clearExcel()">선택 해제</button>
  <span id="filterCount" style="font-size:11px;color:#64748b;margin-left:4px"></span>
</div>

<div class="search-bar no-print">
  <label style="color:#94a3b8;font-size:12px;white-space:nowrap">품목 검색</label>
  <input type="text" id="searchChisu" placeholder="치수 (예: 110*105*15)" onkeydown="if(event.key==='Enter')searchItem()">
  <select id="searchJaejil">
    <option value="">전체 재질</option>
  </select>
  <button class="btn-search" onclick="searchItem()">검색</button>
  <span class="search-results" id="searchResult"></span>
</div>

<div class="stats" id="stats"></div>

<div class="dashboard no-print" id="dashboard">
  <div class="dash-grid">
    <!-- 파이프라인 -->
    <div class="dash-panel full" id="dashPipeline"></div>
    <!-- 재질별 분포 -->
    <div class="dash-panel" id="dashJaejil"></div>
    <!-- 재고 위험도 -->
    <div class="dash-panel" id="dashRisk"></div>
    <!-- 생산 진행률 -->
    <div class="dash-panel" id="dashProgress"></div>
    <!-- 긴급 TOP 5 -->
    <div class="dash-panel" id="dashUrgent"></div>
    <!-- 생산지시 이력 -->
    <div class="dash-panel full" id="dashHistory"></div>
  </div>
</div>

<div class="section active" id="secActive">
  <div class="section-header" onclick="toggleSection('active')">
    <h2>선생산 필요</h2>
    <span class="badge" id="badgeActive">0</span>
    <button class="sort-btn no-print" onclick="event.stopPropagation();toggleSort('active')">치수순 <span id="sortIconActive">↕</span></button>
    <span class="toggle" id="toggleActive">▼</span>
  </div>
  <div class="grid" id="gridActive"></div>
</div>

<div class="section graveyard" id="secGrave">
  <div class="section-header" onclick="toggleSection('grave')">
    <h2>생산지시 중</h2>
    <span class="badge" id="badgeGrave">0</span>
    <button class="sort-btn no-print" onclick="event.stopPropagation();toggleSort('grave')">치수순 <span id="sortIconGrave">↕</span></button>
    <span class="toggle" id="toggleGrave">▼</span>
  </div>
  <div class="grid" id="gridGrave"></div>
</div>

<div class="section completed" id="secCompleted">
  <div class="section-header" onclick="toggleSection('completed')">
    <h2>생산지시 완료</h2>
    <span class="badge" id="badgeCompleted">0</span>
    <button class="sort-btn no-print" onclick="event.stopPropagation();toggleSort('completed')">치수순 <span id="sortIconCompleted">↕</span></button>
    <span class="toggle" id="toggleCompleted">▼</span>
  </div>
  <div class="grid" id="gridCompleted"></div>
</div>

<div class="section stocked" id="secStocked">
  <div class="section-header" onclick="toggleSection('stocked')">
    <h2>재고 충분 (생산 완료)</h2>
    <span class="badge" id="badgeStocked">0</span>
    <button class="sort-btn no-print" onclick="event.stopPropagation();toggleSort('stocked')">치수순 <span id="sortIconStocked">↕</span></button>
    <span class="toggle" id="toggleStocked">▶</span>
  </div>
  <div class="grid" id="gridStocked" style="display:none"></div>
</div>

<div class="section producing" id="secProd">
  <div class="section-header" onclick="toggleSection('prod')">
    <h2>이미 생산중 (7일 내 가공이력)</h2>
    <span class="badge" id="badgeProd">0</span>
    <button class="sort-btn no-print" onclick="event.stopPropagation();toggleSort('prod')">치수순 <span id="sortIconProd">↕</span></button>
    <span class="toggle" id="toggleProd">▶</span>
  </div>
  <div class="grid" id="gridProd" style="display:none"></div>
</div>

<div class="section" id="secOrphan" style="display:none">
  <div class="section-header" onclick="toggleSection('orphan')" style="cursor:pointer">
    <h2 style="color:#f59e0b">&#x26A0; 추적 불가 품목</h2>
    <span class="badge" id="badgeOrphan" style="background:#f59e0b33;color:#fbbf24">0</span>
    <span class="toggle" id="toggleOrphan">▼</span>
  </div>
  <div id="gridOrphan"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">주문 이력</h3>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-loading">로딩중...</div>
    </div>
  </div>
</div>

<script>
let ITEMS = [];
let excelList = new Set();  // 엑셀 내보낼 품목 키

// 정렬 상태: 'none' | 'asc' | 'desc'
let sortState = { active:'none', grave:'none', completed:'none', stocked:'none', prod:'none' };

// 치수 파싱 → 숫자 배열 (110*105*15 → [110,105,15])
function parseChisuNums(chisu) {
  return String(chisu).split('*').map(s => parseFloat(s) || 0);
}

// 치수 비교 (내경 우선 → 외경 → 높이)
function compareChisu(a, b) {
  const pa = parseChisuNums(a.chisu), pb = parseChisuNums(b.chisu);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const diff = (pa[i]||0) - (pb[i]||0);
    if (diff !== 0) return diff;
  }
  return a.jaejil.localeCompare(b.jaejil);
}

function sortItems(items, section) {
  const st = sortState[section];
  if (st === 'none') return items;
  const sorted = [...items].sort(compareChisu);
  return st === 'desc' ? sorted.reverse() : sorted;
}

function toggleSort(section) {
  const cycle = { none:'asc', asc:'desc', desc:'none' };
  sortState[section] = cycle[sortState[section]];
  const icons = { none:'↕', asc:'↑', desc:'↓' };
  const nameMap = { active:'Active', grave:'Grave', completed:'Completed', stocked:'Stocked', prod:'Prod' };
  const iconEl = document.getElementById('sortIcon' + nameMap[section]);
  const btnEl = iconEl.parentElement;
  iconEl.textContent = icons[sortState[section]];
  btnEl.classList.toggle('active', sortState[section] !== 'none');
  render();
}

// 검색 기능
function populateJaejilSelect() {
  const jaejils = [...new Set(ITEMS.map(r => r.jaejil))].sort();
  const sel = document.getElementById('searchJaejil');
  sel.innerHTML = '<option value="">전체 재질</option>';
  jaejils.forEach(j => {
    sel.innerHTML += `<option value="${j}">${j}</option>`;
  });
}

function searchItem() {
  const query = document.getElementById('searchChisu').value.trim();
  const jaejil = document.getElementById('searchJaejil').value;
  const resultEl = document.getElementById('searchResult');

  if (!query && !jaejil) { resultEl.textContent = '치수 또는 재질을 입력하세요'; return; }

  // 이전 하이라이트 제거
  document.querySelectorAll('.card.highlight').forEach(el => el.classList.remove('highlight'));

  // 검색: 치수 부분 일치 + 재질 필터
  const matches = ITEMS.filter(r => {
    const chisuMatch = !query || r.chisu.includes(query);
    const jaejilMatch = !jaejil || r.jaejil === jaejil;
    return chisuMatch && jaejilMatch;
  });

  if (matches.length === 0) {
    resultEl.textContent = '일치하는 품목이 없습니다';
    return;
  }

  resultEl.textContent = `${matches.length}개 품목 발견`;

  // 첫 번째 매치 카드로 스크롤
  const firstMatch = matches[0];
  const cardId = 'card-' + firstMatch.key.replace(/[*|.]/g, '_');
  const cardEl = document.getElementById(cardId);

  if (cardEl) {
    // 해당 섹션이 접혀있으면 펼치기
    const section = cardEl.closest('.section');
    if (section) {
      const grid = section.querySelector('.grid');
      if (grid && grid.style.display === 'none') {
        const secName = section.id.replace('sec','').toLowerCase()
          .replace('active','active').replace('grave','grave')
          .replace('completed','completed').replace('stocked','stocked').replace('prod','prod');
        toggleSection(secName);
      }
    }
    cardEl.scrollIntoView({ behavior:'smooth', block:'center' });
    cardEl.classList.add('highlight');
    // 모든 매치 하이라이트
    matches.forEach(m => {
      const id = 'card-' + m.key.replace(/[*|.]/g, '_');
      const el = document.getElementById(id);
      if (el) el.classList.add('highlight');
    });
    // 5초 후 하이라이트 제거
    setTimeout(() => {
      document.querySelectorAll('.card.highlight').forEach(el => el.classList.remove('highlight'));
    }, 5000);
  } else {
    resultEl.textContent = `${matches.length}개 품목 발견 (필터에 의해 숨겨진 카드 포함)`;
  }
}

let filterFreq = 8, filterStock = 30, filterScore = 0, filterQty = 500;
let activeGroup = 'all';  // 'all', 'g1', 'g2'

function setGroup(group) {
  activeGroup = group;
  if (group === 'g1') {
    filterFreq = 8; filterQty = 500;
  } else if (group === 'g2') {
    filterFreq = 13; filterQty = 1000;
  } else {
    filterFreq = 8; filterQty = 1000;
  }
  document.getElementById('fFreq').value = filterFreq;
  document.getElementById('fFreqVal').textContent = filterFreq;
  document.getElementById('fQty').value = filterQty;
  // 버튼 활성화 표시
  document.getElementById('btnAll').style.opacity = group === 'all' ? '1' : '0.4';
  document.getElementById('btnG1').style.opacity = group === 'g1' ? '1' : '0.4';
  document.getElementById('btnG2').style.opacity = group === 'g2' ? '1' : '0.4';
  render();
}

function applyFilter() {
  filterFreq  = parseInt(document.getElementById('fFreq').value)  || 1;
  filterStock = parseInt(document.getElementById('fStock').value) || 0;
  filterQty   = parseInt(document.getElementById('fQty').value)   || 9999;
  document.getElementById('fFreqVal').textContent  = filterFreq;
  document.getElementById('fStockVal').textContent = filterStock;
  // 슬라이더 수동 조작 시 그룹 버튼 해제
  document.getElementById('btnAll').style.opacity = '0.4';
  document.getElementById('btnG1').style.opacity = '0.4';
  document.getElementById('btnG2').style.opacity = '0.4';
  activeGroup = 'custom';
  render();
}

function getActiveFiltered() {
  const isStocked = r => r.stock >= 0 && r.stock_ratio > filterStock;
  return ITEMS.filter(r =>
    !r.in_production && !isStocked(r) && !isInGrave(r.key) && !(r.key in completed) &&
    r.freq >= filterFreq && r.total_qty <= filterQty && r.score >= filterScore
  );
}

function selectAllActive() {
  getActiveFiltered().forEach(r => excelList.add(r.key));
  document.getElementById('excelCount').textContent = excelList.size;
  document.getElementById('btnExcel').style.display = excelList.size > 0 ? '' : 'none';
  render();
}

function clearExcel() {
  excelList.clear();
  document.getElementById('excelCount').textContent = 0;
  document.getElementById('btnExcel').style.display = 'none';
  render();
}

const STORAGE_KEY = 'soltri_graveyard';
const COMPLETED_KEY = 'soltri_completed';
const ARCHIVED_KEY = 'soltri_archived';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRiVeUmM1yZZs3GEzB0Y1y-EhVvSNM6Y7jJEXGBtYqhmZlAJcbrNoQBw82M36w6ozebQ/exec';
let graveyard = {};
let completed = {};
let archived = {};  // 재고 충분으로 졸업한 이력 보존
let undoStack = [];

// PC 식별자
const PC_ID = (function() {
  const stored = localStorage.getItem('soltri_pc_name');
  if (stored) return stored;
  const ua = navigator.userAgent;
  const os = ua.includes('Windows') ? 'Win' : ua.includes('Mac') ? 'Mac' : 'Other';
  const br = ua.includes('Edg/') ? 'Edge' : ua.includes('Chrome') ? 'Chrome' : 'Firefox';
  const name = os + '/' + br + '/' + Math.random().toString(36).slice(2, 6).toUpperCase();
  localStorage.setItem('soltri_pc_name', name);
  return name;
})();

function sendLog(action, key, from, to, note) {
  if (!APPS_SCRIPT_URL) return;
  const parts = key.split('|');
  const log = [{
    timestamp: new Date().toLocaleString('ko-KR', {timeZone:'Asia/Seoul', hour12:false}),
    action, chisu: parts[0] || key, jaejil: parts[1] || '',
    from, to, pc: PC_ID, note: note || ''
  }];
  const data = encodeURIComponent(JSON.stringify(log));
  const cbName = '_log_' + Date.now();
  window[cbName] = function() { delete window[cbName]; try { document.body.removeChild(sc); } catch(e){} };
  const sc = document.createElement('script');
  sc.src = `${APPS_SCRIPT_URL}?action=log&data=${data}&callback=${cbName}`;
  sc.onerror = () => { delete window[cbName]; };
  document.body.appendChild(sc);
}

function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(graveyard));
  localStorage.setItem(COMPLETED_KEY, JSON.stringify(completed));
  localStorage.setItem(ARCHIVED_KEY, JSON.stringify(archived));
}

function syncToSheet(type) {
  if (!APPS_SCRIPT_URL) return;
  const data = encodeURIComponent(JSON.stringify(type === 'completed' ? completed : graveyard));
  const cbName = '_sync_' + Date.now();
  window[cbName] = function() { delete window[cbName]; try { document.body.removeChild(sc); } catch(e){} };
  const sc = document.createElement('script');
  sc.src = `${APPS_SCRIPT_URL}?action=save&type=${type}&data=${data}&callback=${cbName}`;
  sc.onerror = () => { delete window[cbName]; };
  document.body.appendChild(sc);
}

function syncToServer() {
  // graveyard.json을 로컬 서버에 저장 (refresh.py 연동용)
  try {
    fetch('/graveyard.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(graveyard)
    }).catch(() => {});
  } catch(e) {}
}

function save() {
  saveLocal();
  syncToSheet('graveyard');
  syncToServer();
}
function saveCompleted() {
  saveLocal();
  syncToSheet('completed');
}

function loadGraveyardFromSheet(callback) {
  if (!APPS_SCRIPT_URL) {
    graveyard = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    completed = JSON.parse(localStorage.getItem(COMPLETED_KEY) || '{}');
    archived = JSON.parse(localStorage.getItem(ARCHIVED_KEY) || '{}');
    callback(); return;
  }
  const cbName = '_loadGrave_' + Date.now();
  window[cbName] = function(data) {
    graveyard = data.graveyard || {};
    completed = data.completed || {};
    saveLocal();
    delete window[cbName];
    try { document.body.removeChild(sc); } catch(e){}
    callback();
  };
  const sc = document.createElement('script');
  sc.src = `${APPS_SCRIPT_URL}?action=load&callback=${cbName}`;
  sc.onerror = function() {
    graveyard = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    completed = JSON.parse(localStorage.getItem(COMPLETED_KEY) || '{}');
    archived = JSON.parse(localStorage.getItem(ARCHIVED_KEY) || '{}');
    delete window[cbName];
    callback();
  };
  document.body.appendChild(sc);
}

function isInGrave(key) { return key in graveyard; }
function graveKeys() { return Object.keys(graveyard); }

// 리프레시: JSON 다시 읽고, 무덤 품목 중 재고가 보냈을때보다 줄었으면 복귀
function refreshCheck() {
  loadFromSheet(function(newData) {
    if (!newData) { showToast('데이터 로드 실패'); return; }
    ITEMS = newData;
    _autoCleanDone = false;  // 새 데이터로 자동이동 재판정 허용
    showToast('데이터 갱신 완료');
    render();
  });
}

function getStockClass(r) {
  if (r.stock < 0) return 'ok';
  if (r.stock_ratio <= 10) return 'danger';
  if (r.stock_ratio <= 20) return 'warn';
  return 'ok';
}

function makeCard(r, type) {
  const sc = getStockClass(r);
  const stockW = r.stock >= 0 ? Math.min(100, r.stock_ratio) : 50;
  const stockDisplay = r.stock >= 0 ? r.stock + '개' : '-';
  const hint = type === 'active' ? '▶' : type === 'grave' ? '◀' : type === 'prod' ? '▶' : '';
  const cardClass = type === 'grave' ? 'card card-grave' : 'card';
  const onclick = type === 'active' ? `sendToGrave('${r.key}')` : type === 'grave' ? `reviveFromGrave('${r.key}')` : type === 'prod' ? `sendToGrave('${r.key}')` : '';
  const clickAttr = onclick ? `onclick="${onclick}"` : '';
  const excelSel = excelList.has(r.key) ? ' selected' : '';
  const cardBtns = `<div class="card-btns">
    <span class="card-btn" onclick="event.stopPropagation();showHistory('${r.key}','${r.chisu}','${r.jaejil}')">이력</span>
    ${(type === 'active' || type === 'grave' || type === 'prod') ? `<span class="card-btn excel${excelSel}" onclick="event.stopPropagation();toggleExcel('${r.key}')" id="xl-${r.key.replace(/[*|.]/g,'_')}">엑셀</span>` : ''}
    ${type === 'grave' ? `<span class="card-btn" style="color:#a78bfa;border-color:#7c3aed44" onclick="event.stopPropagation();markCompleted('${r.key}')">완료</span>` : ''}
  </div>`;
  const pointerStyle = '';

  return `<div class="${cardClass}" ${clickAttr} style="${pointerStyle}" id="card-${r.key.replace(/[*|.]/g,'_')}">
    ${cardBtns}
    <div class="row1">
      <span class="chisu">${r.chisu}</span>
      <span class="jaejil-badge jaejil-${r.jaejil}">${r.jaejil}</span>
    </div>
    <div class="row2">
      <span>주문 <strong>${r.freq}회</strong></span>
      <span>총량 <strong>${r.total_qty}개</strong></span>
      <span>평균 <strong>${r.avg_qty}/회</strong></span>
    </div>
    <div class="stock-bar"><div class="stock-fill ${sc}" style="width:${stockW}%"></div></div>
    <div class="stock-label">
      <span>${type === 'grave' && r._graveDate ? '지시일 ' + String(r._graveDate).slice(0,10) : '현재고'}</span>
      <span class="stock-num ${sc}">${stockDisplay}</span>
    </div>
    <div class="timeline" id="tl-${r.key.replace(/[*|.]/g,'_')}"></div>
    <div class="timeline-label" style="position:relative"><span>100일</span><span class="mid">50일</span><span>오늘</span></div>
    ${hint ? `<div class="action-hint">${hint}</div>` : ''}
  </div>`;
}

// 초기 로드시 한 번만 실행하는 자동 이동 로직 (고정 기준 30%)
const STOCK_THRESHOLD = 30;  // 자동 이동 판정 기준 (고정)
let _autoCleanDone = false;

function runAutoCleanOnce() {
  if (_autoCleanDone) return;
  _autoCleanDone = true;

  const isStockedFixed = r => r.stock >= 0 && r.stock_ratio > STOCK_THRESHOLD;

  // completed → archived (재고 충분으로 졸업)
  let autoMoved = 0;
  for (const key of Object.keys(completed)) {
    const item = ITEMS.find(r => r.key === key);
    if (item && isStockedFixed(item)) {
      archived[key] = {
        graveDate: completed[key].graveDate,
        completedDate: completed[key].completedDate,
        archivedDate: new Date().toISOString().slice(0, 10),
        chisu: item.chisu,
        jaejil: item.jaejil
      };
      delete completed[key];
      autoMoved++;
    }
  }
  if (autoMoved > 0) {
    saveCompleted();
    showToast(`재고 충족 ${autoMoved}개 → 재고 충분으로 자동 이동 (이력 보존됨)`);
  }
}

function render() {

  // 화면 표시용 필터 (데이터 영구 변경 없음)
  const isStockedView = r => r.stock >= 0 && r.stock_ratio > filterStock;
  const itemKeys = new Set(ITEMS.map(r => r.key));

  // ── 시나리오 3: graveyard에 있는 품목은 in_production 무시 ──
  ITEMS.forEach(r => {
    if (isInGrave(r.key) || r.key in completed) {
      r._origInProd = r.in_production;
      r.in_production = false;
    }
  });

  // ── 초기 로드시 한 번만 자동 이동 (고정 30% 기준) ──
  runAutoCleanOnce();

  // ── 시나리오 1: orphan 감지 (graveyard/completed에 있는데 ITEMS에 없는 품목) ──
  const orphanGrave = [];
  for (const [key, date] of Object.entries(graveyard)) {
    if (!itemKeys.has(key)) {
      orphanGrave.push({ key, date, type: '생산지시 중', source: 'graveyard' });
    }
  }
  const orphanCompleted = [];
  for (const [key, info] of Object.entries(completed)) {
    if (!itemKeys.has(key)) {
      orphanCompleted.push({ key, date: info.graveDate, completedDate: info.completedDate, type: '생산지시 완료', source: 'completed' });
    }
  }
  const orphans = [...orphanGrave, ...orphanCompleted];

  const activeItems = ITEMS.filter(r =>
    !r.in_production && !isStockedView(r) && !isInGrave(r.key) && !(r.key in completed) &&
    r.freq >= filterFreq && r.total_qty <= filterQty && r.score >= filterScore
  );
  const graveItems = ITEMS.filter(r => isInGrave(r.key));
  graveItems.forEach(r => { r._graveDate = graveyard[r.key] || ''; });
  const completedItems = ITEMS.filter(r => r.key in completed);
  completedItems.forEach(r => { r._completedDate = completed[r.key].completedDate || ''; r._graveDate = completed[r.key].graveDate || ''; });
  const stockedItems = ITEMS.filter(r => isStockedView(r) && !isInGrave(r.key) && !(r.key in completed));
  // 생산중 = 7일내 가공이력 있고 재고 아직 부족 (graveyard, completed 제외)
  const prodItems = ITEMS.filter(r => r.in_production && !isStockedView(r) && !isInGrave(r.key) && !(r.key in completed));

  const sortedActive = sortItems(activeItems, 'active');
  const sortedGrave = sortItems(graveItems, 'grave');
  const sortedCompleted = sortItems(completedItems, 'completed');
  const sortedStocked = sortItems(stockedItems, 'stocked');
  const sortedProd = sortItems(prodItems, 'prod');

  document.getElementById('gridActive').innerHTML = sortedActive.length
    ? sortedActive.map(r => makeCard(r, 'active')).join('')
    : '<div class="empty-msg">모든 품목 생산지시 중!</div>';
  document.getElementById('gridGrave').innerHTML = sortedGrave.length
    ? sortedGrave.map(r => makeCard(r, 'grave')).join('')
    : '<div class="empty-msg">아직 없음</div>';
  document.getElementById('gridCompleted').innerHTML = sortedCompleted.length
    ? sortedCompleted.map(r => makeCard(r, 'completed')).join('')
    : '<div class="empty-msg">아직 없음</div>';
  document.getElementById('badgeCompleted').textContent = completedItems.length;
  document.getElementById('gridStocked').innerHTML = sortedStocked.length
    ? sortedStocked.map(r => makeCard(r, 'stocked')).join('')
    : '<div class="empty-msg">아직 없음</div>';
  document.getElementById('gridProd').innerHTML = sortedProd.map(r => makeCard(r, 'prod')).join('');

  // ── orphan 섹션 렌더링 ──
  const orphanEl = document.getElementById('secOrphan');
  const orphanGrid = document.getElementById('gridOrphan');
  if (orphans.length > 0) {
    orphanEl.style.display = '';
    document.getElementById('badgeOrphan').textContent = orphans.length;
    orphanGrid.innerHTML = orphans.map(o => {
      const parts = o.key.split('|');
      const chisu = parts[0] || o.key;
      const jaejil = parts[1] || '';
      const dateStr = o.date ? String(o.date).slice(0, 10) : '';
      return `<div style="background:#1e293b;border:2px solid #f59e0b44;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <span style="font-weight:800;font-size:16px">${chisu}</span>
          <span style="padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:#47556933;color:#94a3b8;margin-left:8px">${jaejil}</span>
          <div style="font-size:11px;color:#94a3b8;margin-top:4px">
            ${o.type} (지시일: ${dateStr})${o.completedDate ? ' / 완료일: ' + o.completedDate : ''}
          </div>
          <div style="font-size:10px;color:#f59e0b;margin-top:2px">데이터에서 빠짐 (freq&lt;5 또는 total&gt;1000)</div>
        </div>
        <button onclick="removeOrphan('${o.key}','${o.source}')" style="background:#ef444433;border:1px solid #ef4444;color:#f87171;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700">제거</button>
      </div>`;
    }).join('');
  } else {
    orphanEl.style.display = 'none';
  }

  document.getElementById('badgeActive').textContent = activeItems.length;
  document.getElementById('badgeGrave').textContent = graveItems.length;
  document.getElementById('badgeStocked').textContent = stockedItems.length;
  document.getElementById('badgeProd').textContent = prodItems.length;

  // stats
  const dangerCount = activeItems.filter(r => r.stock_ratio <= 10).length;
  const warnCount = activeItems.filter(r => r.stock_ratio > 10 && r.stock_ratio <= 20).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat danger"><div class="num">${dangerCount}</div><div class="lbl">재고 10% 이하</div></div>
    <div class="stat warn"><div class="num">${warnCount}</div><div class="lbl">재고 20% 이하</div></div>
    <div class="stat ok"><div class="num">${graveItems.length}</div><div class="lbl">생산지시 중</div></div>
    <div class="stat info"><div class="num">${stockedItems.length}</div><div class="lbl">재고 충분</div></div>
  `;

  renderDashboard(activeItems, graveItems, completedItems, stockedItems, prodItems);

  document.getElementById('btnUndo').style.display = undoStack.length ? '' : 'none';
  const fc = document.getElementById('filterCount');
  if (fc) fc.textContent = `필터 결과 ${activeItems.length}개`;

  if (typeof renderTimelines === 'function') renderTimelines();
}

function toggleDashboard() {
  const el = document.getElementById('dashboard');
  el.classList.toggle('show');
}

function renderDashboard(activeItems, graveItems, completedItems, stockedItems, prodItems) {
  const total = ITEMS.length;
  if (!total) return;

  // ── 1. 파이프라인 ──
  const stages = [
    { label:'선생산 필요', count:activeItems.length, color:'#ef4444', bg:'#ef444422' },
    { label:'생산지시 중', count:graveItems.length, color:'#94a3b8', bg:'#47556922' },
    { label:'생산지시 완료', count:completedItems.length, color:'#a78bfa', bg:'#7c3aed22' },
    { label:'이미 생산중', count:prodItems.length, color:'#3b82f6', bg:'#3b82f622' },
    { label:'재고 충분', count:stockedItems.length, color:'#22c55e', bg:'#22c55e22' }
  ];
  const managed = graveItems.length + completedItems.length + stockedItems.length;
  document.getElementById('dashPipeline').innerHTML = `
    <h3>생산 파이프라인</h3>
    <div class="pipeline">
      ${stages.map((s,i) => `
        <div class="pipe-stage" style="background:${s.bg};border:1px solid ${s.color}33">
          <div class="pipe-num" style="color:${s.color}">${s.count}</div>
          <div class="pipe-lbl" style="color:${s.color}">${s.label}</div>
        </div>
        ${i < stages.length-1 ? '<div class="pipe-arrow">→</div>' : ''}
      `).join('')}
    </div>
    <div style="text-align:center;margin-top:8px;font-size:12px;color:#64748b">
      전체 <strong style="color:#e2e8f0">${total}</strong>개 품목 중
      <strong style="color:#22c55e">${managed}</strong>개 관리 완료
      (<strong style="color:#3b82f6">${total > 0 ? Math.round(managed/total*100) : 0}%</strong>)
    </div>`;

  // ── 2. 재질별 분포 ──
  const jaejilMap = {};
  const jaejilColors = { CN10:'#b8860b', RS40:'#0d9488', CM20:'#6b7280', CN20:'#7c3aed' };
  ITEMS.forEach(r => { jaejilMap[r.jaejil] = (jaejilMap[r.jaejil]||0) + 1; });
  const jaejilSorted = Object.entries(jaejilMap).sort((a,b) => b[1]-a[1]);
  const maxJCount = jaejilSorted.length > 0 ? jaejilSorted[0][1] : 1;

  // 재질별 상세 (active vs managed)
  const jaejilActive = {}, jaejilManaged = {};
  activeItems.forEach(r => { jaejilActive[r.jaejil] = (jaejilActive[r.jaejil]||0) + 1; });
  [...graveItems,...completedItems,...stockedItems].forEach(r => { jaejilManaged[r.jaejil] = (jaejilManaged[r.jaejil]||0) + 1; });

  document.getElementById('dashJaejil').innerHTML = `
    <h3>재질별 분포</h3>
    ${jaejilSorted.map(([j, cnt]) => {
      const pct = Math.round(cnt/maxJCount*100);
      const c = jaejilColors[j] || '#475569';
      const act = jaejilActive[j]||0;
      const mgd = jaejilManaged[j]||0;
      return `<div class="hbar-row">
        <span class="hbar-label">${j}</span>
        <div class="hbar-track">
          <div class="hbar-fill" style="width:${pct}%;background:${c}">${cnt}개</div>
        </div>
        <span class="hbar-val" style="color:${act>0?'#ef4444':'#22c55e'}" title="필요 ${act} / 관리 ${mgd}">${act>0?act+'!':'OK'}</span>
      </div>`;
    }).join('')}`;

  // ── 3. 재고 위험도 분포 ──
  const risk0 = ITEMS.filter(r => r.stock >= 0 && r.stock === 0).length;
  const risk10 = ITEMS.filter(r => r.stock >= 0 && r.stock > 0 && r.stock_ratio <= 10).length;
  const risk20 = ITEMS.filter(r => r.stock >= 0 && r.stock_ratio > 10 && r.stock_ratio <= 20).length;
  const risk30 = ITEMS.filter(r => r.stock >= 0 && r.stock_ratio > 20 && r.stock_ratio <= 30).length;
  const riskOk = ITEMS.filter(r => r.stock >= 0 && r.stock_ratio > 30).length;
  const riskNa = ITEMS.filter(r => r.stock < 0).length;
  const riskSegs = [
    { label:'재고 0', count:risk0, color:'#dc2626' },
    { label:'~10%', count:risk10, color:'#ef4444' },
    { label:'~20%', count:risk20, color:'#f59e0b' },
    { label:'~30%', count:risk30, color:'#eab308' },
    { label:'30%+', count:riskOk, color:'#22c55e' },
    { label:'미등록', count:riskNa, color:'#475569' }
  ].filter(s => s.count > 0);

  document.getElementById('dashRisk').innerHTML = `
    <h3>재고 위험도 분포</h3>
    <div class="stacked-bar">
      ${riskSegs.map(s => {
        const w = Math.max(s.count/total*100, 2);
        return `<div class="stacked-seg" style="width:${w}%;background:${s.color}" title="${s.label}: ${s.count}개">${s.count > 0 ? s.count : ''}</div>`;
      }).join('')}
    </div>
    <div class="stacked-legend">
      ${riskSegs.map(s => `<span><span class="dot" style="background:${s.color}"></span>${s.label} ${s.count}</span>`).join('')}
    </div>
    <div style="margin-top:12px;font-size:12px;color:#64748b">
      위험(0~10%): <strong style="color:#ef4444">${risk0+risk10}개</strong>
      &nbsp;·&nbsp; 주의(~20%): <strong style="color:#f59e0b">${risk20}개</strong>
      &nbsp;·&nbsp; 안전(30%+): <strong style="color:#22c55e">${riskOk}개</strong>
    </div>`;

  // ── 4. 생산 진행률 ──
  const totalManageable = activeItems.length + graveItems.length + completedItems.length + stockedItems.length;
  const doneCount = stockedItems.length + completedItems.length;
  const progressPct = totalManageable > 0 ? Math.round(doneCount / totalManageable * 100) : 0;
  const circumference = 2 * Math.PI * 42;
  const offset = circumference - (progressPct / 100) * circumference;
  const progressColor = progressPct >= 70 ? '#22c55e' : progressPct >= 40 ? '#f59e0b' : '#ef4444';

  // 평균 처리일 계산
  let avgDays = 0, dayCount = 0;
  for (const [key, info] of Object.entries(completed)) {
    if (info.graveDate && info.completedDate) {
      const d1 = new Date(info.graveDate), d2 = new Date(info.completedDate);
      const diff = Math.round((d2 - d1) / 86400000);
      if (diff >= 0) { avgDays += diff; dayCount++; }
    }
  }
  const avgDaysStr = dayCount > 0 ? Math.round(avgDays / dayCount) + '일' : '-';

  document.getElementById('dashProgress').innerHTML = `
    <h3>생산 관리 진행률</h3>
    <div class="progress-ring-wrap">
      <div class="progress-ring">
        <svg width="100" height="100">
          <circle class="ring-bg" cx="50" cy="50" r="42"/>
          <circle class="ring-fg" cx="50" cy="50" r="42" style="stroke:${progressColor};stroke-dasharray:${circumference};stroke-dashoffset:${offset}"/>
        </svg>
        <div class="ring-text" style="color:${progressColor}">${progressPct}%</div>
      </div>
      <div class="progress-detail">
        선생산 필요: <strong style="color:#ef4444">${activeItems.length}</strong><br>
        생산지시 중: <strong>${graveItems.length}</strong><br>
        생산지시 완료: <strong style="color:#a78bfa">${completedItems.length}</strong><br>
        재고 충분: <strong style="color:#22c55e">${stockedItems.length}</strong><br>
        평균 처리기간: <strong style="color:#3b82f6">${avgDaysStr}</strong>
      </div>
    </div>`;

  // ── 5. 긴급 TOP 5 ──
  const urgent5 = [...activeItems].sort((a,b) => b.score - a.score).slice(0, 5);
  document.getElementById('dashUrgent').innerHTML = `
    <h3>긴급 TOP 5</h3>
    ${urgent5.length === 0 ? '<div style="text-align:center;color:#475569;padding:20px">긴급 품목 없음</div>' : `
    <table class="urgent-table">
      <thead><tr><th>치수</th><th>재질</th><th>재고</th><th>점수</th><th>주문</th></tr></thead>
      <tbody>
        ${urgent5.map(r => {
          const sc = getStockClass(r);
          const scColor = sc === 'danger' ? '#ef4444' : sc === 'warn' ? '#f59e0b' : '#22c55e';
          const jc = jaejilColors[r.jaejil] || '#475569';
          return `<tr>
            <td class="u-chisu clickable" onclick="searchAndJump('${r.key}')">${r.chisu}</td>
            <td><span class="u-badge" style="background:${jc}">${r.jaejil}</span></td>
            <td class="u-stock" style="color:${scColor}">${r.stock >= 0 ? r.stock+'개' : '-'}</td>
            <td class="u-score">${r.score}</td>
            <td style="color:#94a3b8">${r.freq}회</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`}`;

  // ── 6. 생산지시 이력 ──
  const histRows = [];
  // graveyard (생산지시 중)
  for (const [key, val] of Object.entries(graveyard)) {
    const parts = key.split('|');
    const gd = typeof val === 'string' ? val.slice(0,10) : '';
    histRows.push({ chisu:parts[0]||key, jaejil:parts[1]||'', status:'생산지시 중', graveDate:gd, compDate:'', key });
  }
  // completed (완료)
  for (const [key, val] of Object.entries(completed)) {
    const parts = key.split('|');
    let gd = (val.graveDate||'').slice(0,10);
    let cd = (val.completedDate||'').slice(0,10);
    // 6자리(YYMMDD) → YYYY-MM-DD
    if (gd.length===6) gd = '20'+gd.slice(0,2)+'-'+gd.slice(2,4)+'-'+gd.slice(4,6);
    if (cd.length===6) cd = '20'+cd.slice(0,2)+'-'+cd.slice(2,4)+'-'+cd.slice(4,6);
    const days = gd && cd ? Math.round((new Date(cd)-new Date(gd))/86400000) : '';
    histRows.push({ chisu:parts[0]||key, jaejil:parts[1]||'', status:'완료', graveDate:gd, compDate:cd, days, key });
  }
  // archived (재고 충분 졸업)
  for (const [key, val] of Object.entries(archived)) {
    const parts = key.split('|');
    let gd = (val.graveDate||'').slice(0,10);
    let cd = (val.completedDate||val.archivedDate||'').slice(0,10);
    if (gd.length===6) gd = '20'+gd.slice(0,2)+'-'+gd.slice(2,4)+'-'+gd.slice(4,6);
    if (cd.length===6) cd = '20'+cd.slice(0,2)+'-'+cd.slice(2,4)+'-'+cd.slice(4,6);
    const days = gd && cd ? Math.round((new Date(cd)-new Date(gd))/86400000) : '';
    histRows.push({ chisu:parts[0]||key, jaejil:parts[1]||'', status:'재고충분', graveDate:gd, compDate:cd, days, key });
  }
  histRows.sort((a,b) => (b.graveDate||'').localeCompare(a.graveDate||''));

  const totalHist = histRows.length;
  const graveCount = histRows.filter(r=>r.status==='생산지시 중').length;
  const doneHist = histRows.filter(r=>r.status==='완료').length;
  const archivedCount = histRows.filter(r=>r.status==='재고충분').length;

  document.getElementById('dashHistory').innerHTML = `
    <h3>생산지시 이력 <span style="font-size:11px;color:#64748b;font-weight:400;text-transform:none">(graveyard + completed + archived)</span></h3>
    ${totalHist === 0 ? '<div style="text-align:center;color:#475569;padding:20px">이력 없음</div>' : `
    <table class="hist-log">
      <thead><tr>
        <th>치수</th><th>재질</th><th>상태</th><th>지시일</th><th>완료일</th><th style="text-align:right">소요일</th>
      </tr></thead>
      <tbody>
        ${histRows.map(r => {
          const stClass = r.status==='생산지시 중' ? 'st-grave' : 'st-done';
          const jc = jaejilColors[r.jaejil] || '#475569';
          return `<tr>
            <td style="font-weight:700;cursor:pointer" onclick="searchAndJump('${r.key}')">${r.chisu}</td>
            <td><span class="u-badge" style="background:${jc}">${r.jaejil}</span></td>
            <td class="${stClass}">${r.status}</td>
            <td style="color:#94a3b8">${r.graveDate}</td>
            <td style="color:#94a3b8">${r.compDate || '-'}</td>
            <td class="days">${r.days !== undefined && r.days !== '' ? r.days+'일' : '-'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="hist-summary">
      <span>전체 <strong>${totalHist}</strong>건</span>
      <span>지시중 <strong style="color:#f59e0b">${graveCount}</strong></span>
      <span>완료 <strong style="color:#22c55e">${doneHist}</strong></span>
      <span>재고충분 <strong style="color:#3b82f6">${archivedCount}</strong></span>
    </div>`}`;
}

function searchAndJump(key) {
  document.querySelectorAll('.card.highlight').forEach(el => el.classList.remove('highlight'));
  const cardId = 'card-' + key.replace(/[*|.]/g, '_');
  const cardEl = document.getElementById(cardId);
  if (cardEl) {
    const section = cardEl.closest('.section');
    if (section) {
      const grid = section.querySelector('.grid');
      if (grid && grid.style.display === 'none') {
        const names = {secActive:'active',secGrave:'grave',secCompleted:'completed',secStocked:'stocked',secProd:'prod'};
        const n = names[section.id];
        if (n) toggleSection(n);
      }
    }
    cardEl.scrollIntoView({ behavior:'smooth', block:'center' });
    cardEl.classList.add('highlight');
    setTimeout(() => cardEl.classList.remove('highlight'), 5000);
  }
}

function sendToGrave(key) {
  if (isInGrave(key)) return;
  const item = ITEMS.find(r => r.key === key);
  const fromState = item && item.in_production ? '이미 생산중' : '선생산 필요';
  graveyard[key] = new Date().toISOString();
  undoStack.push({ action: 'send', key });
  save();
  sendLog('생산지시', key, fromState, '생산지시 중');
  showToast('생산지시 중 처리됨');
  render();
}

function reviveFromGrave(key) {
  const oldDate = graveyard[key];
  delete graveyard[key];
  undoStack.push({ action: 'revive', key, oldDate });
  save();
  sendLog('복귀', key, '생산지시 중', '선생산 필요');
  showToast('선생산 리스트로 복귀');
  render();
}

function markCompleted(key) {
  if (!graveyard[key]) return;
  const graveDate = String(graveyard[key]).slice(0, 10);
  const today = new Date().toISOString().slice(0, 10);
  completed[key] = { graveDate: graveDate, completedDate: today };
  delete graveyard[key];
  undoStack.push({ action: 'complete', key, graveDate });
  save();
  saveCompleted();
  sendLog('완료', key, '생산지시 중', '생산지시 완료', '수동완료');
  showToast('생산지시 완료 처리됨');
  render();
}

function undoLast() {
  if (!undoStack.length) return;
  const last = undoStack.pop();
  if (last.action === 'send') {
    delete graveyard[last.key];
    sendLog('되돌리기', last.key, '생산지시 중', '선생산 필요', 'Undo');
  } else if (last.action === 'complete') {
    graveyard[last.key] = last.graveDate || new Date().toISOString();
    delete completed[last.key];
    saveCompleted();
    sendLog('되돌리기', last.key, '생산지시 완료', '생산지시 중', 'Undo');
  } else {
    graveyard[last.key] = last.oldDate || '';
    sendLog('되돌리기', last.key, '선생산 필요', '생산지시 중', 'Undo');
  }
  save();
  showToast('되돌리기 완료');
  render();
}

function autoRemoveGraveyard() {
  let removed = 0;
  for (const key of Object.keys(graveyard)) {
    const item = ITEMS.find(r => r.key === key);
    const graveDate = String(graveyard[key]).slice(0, 10);
    if (item && item.latest_balju && graveDate && item.latest_balju >= graveDate) {
      completed[key] = { graveDate, completedDate: item.latest_balju };
      delete graveyard[key];
      sendLog('자동완료', key, '생산지시 중', '생산지시 완료', '발주일=' + item.latest_balju);
      removed++;
    }
  }
  if (removed > 0) {
    save();
    saveCompleted();
    showToast(`발주 확인 ${removed}개 → 생산지시 완료로 이동`);
  }
}

function autoCleanCompleted() {
  // 고정 기준 30%로 판정 (슬라이더 영향 없음)
  let removed = 0;
  for (const key of Object.keys(completed)) {
    const item = ITEMS.find(r => r.key === key);
    if (item && item.stock >= 0 && item.stock_ratio > STOCK_THRESHOLD) {
      sendLog('자동졸업', key, '생산지시 완료', '재고 충분', '재고율=' + item.stock_ratio + '%');
      delete completed[key];
      removed++;
    }
  }
  if (removed > 0) {
    saveCompleted();
    showToast(`재고 충족 ${removed}개 → 생산지시 완료에서 자동 제거`);
  }
}

function removeOrphan(key, source) {
  if (source === 'graveyard') {
    delete graveyard[key];
    save();
  } else {
    delete completed[key];
    saveCompleted();
  }
  showToast('추적 불가 품목 제거됨');
  render();
}

function resetAll() {
  if (!confirm('생산지시 기록을 모두 초기화할까요?')) return;
  graveyard = {};
  undoStack = [];
  save();
  showToast('초기화 완료');
  render();
}

function toggleExcel(key) {
  if (excelList.has(key)) excelList.delete(key);
  else excelList.add(key);
  document.getElementById('excelCount').textContent = excelList.size;
  document.getElementById('btnExcel').style.display = excelList.size > 0 ? '' : 'none';
  render();
}

// 재질 → 품목/재질 코드 변환
function toJaejilCode(jaejil) {
  return 'W/' + jaejil;
}

// 치수 → 발주서 형식 (내경*외경*높이 → 외경 x 내경 x 높이)
function toBaljuChisu(chisu) {
  const p = chisu.split('*');
  if (p.length === 3) return p[1] + ' x ' + p[0] + ' x ' + p[2];
  return chisu.replace(/\*/g, ' x ');
}

function downloadExcel() {
  if (excelList.size === 0) { showToast('엑셀로 내보낼 품목을 선택하세요'); return; }

  const selected = ITEMS.filter(r => excelList.has(r.key));
  const today = new Date();
  const yy = today.getFullYear().toString().slice(2);
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const dateStr = yy + mm + dd;

  const future = new Date(today);
  let bizDays = 0;
  while (bizDays < 5) {
    future.setDate(future.getDate() + 1);
    const dow = future.getDay();
    if (dow !== 0 && dow !== 6) bizDays++;
  }

  // JS Date → Excel 날짜 시리얼 (1900-01-00 기준)
  function toExcelDate(d) {
    return 25569 + (d.getTime() - d.getTimezoneOffset() * 60000) / 86400000;
  }

  // 노란색 스타일
  const YELLOW = {patternType:'solid', fgColor:{rgb:'FFFF00'}};
  const NONE   = {patternType:'none'};

  function makeSheet() {
    const ws = {};
    const merges = [];

    function put(r, col, v, opts) {
      opts = opts || {};

function toggleSection(name) {
  const map = { active: 'gridActive', grave: 'gridGrave', completed: 'gridCompleted', stocked: 'gridStocked', prod: 'gridProd' };
  const toggleMap = { active: 'toggleActive', grave: 'toggleGrave', completed: 'toggleCompleted', stocked: 'toggleStocked', prod: 'toggleProd' };
  const grid = document.getElementById(map[name]);
  const toggle = document.getElementById(toggleMap[name]);
  if (grid.style.display === 'none') {
    grid.style.display = '';
    toggle.textContent = '▼';
  } else {
    grid.style.display = 'none';
    toggle.textContent = '▶';
  }
}

let toastTimer;

}

// 주문이력 모달
let historyCache = null;
const HISTORY_TAB = encodeURIComponent('주문이력');

function showHistory(key, chisu, jaejil) {
  document.getElementById('modalTitle').textContent = chisu + ' / ' + jaejil + ' 주문이력';
  document.getElementById('modalBody').innerHTML = '<div class="modal-loading">로딩중...</div>';
  document.getElementById('modalBg').classList.add('show');

  if (historyCache) {
    renderHistory(key, chisu, jaejil);
    return;
  }

  const cbName = '_histCb_' + Date.now();
  const url = `https://docs.google.com/spreadsheets/d/1zkyYFiX5MGkGj7cnjhpiPvlzHLwN0CZKMFnjl9tTzqA/gviz/tq?sheet=${HISTORY_TAB}&tqx=responseHandler:${cbName}`;

  window[cbName] = function(response) {
    try {
      historyCache = [];
      for (const row of response.table.rows) {
        const c = row.c;
        if (!c || !c[0]) continue;
        const v = (i) => c[i] ? (c[i].v != null ? c[i].v : '') : '';
        historyCache.push({ chisu: String(v(0)), jaejil: String(v(1)), date: String(v(2)), customer: String(v(3)), qty: parseInt(v(4)) || 0, type: String(v(5)) || '주문' });
      }
      renderHistory(key, chisu, jaejil);
    } catch(e) {
      document.getElementById('modalBody').innerHTML = '<div class="modal-loading">이력 로드 실패</div>';
    }
    delete window[cbName];
    document.body.removeChild(script);
  };
  const script = document.createElement('script');
  script.src = url;
  script.onerror = function() { document.getElementById('modalBody').innerHTML = '<div class="modal-loading">이력 로드 실패</div>'; delete window[cbName]; };
  document.body.appendChild(script);
}

function renderHistory(key, chisu, jaejil) {
  const rows = historyCache.filter(h => h.chisu === chisu && h.jaejil === jaejil);
  rows.sort((a, b) => b.date.localeCompare(a.date));

  if (rows.length === 0) {
    document.getElementById('modalBody').innerHTML = '<div class="modal-loading">이력 없음</div>';
    return;
  }

  let total = 0;
  let html = '<table class="history-table"><thead><tr><th>주문일자</th><th>거래처</th><th>수량</th><th>구분</th></tr></thead><tbody>';
  for (const r of rows) {
    total += r.qty;
    const isBalju = r.type === '발주';
    const rowStyle = isBalju ? 'color:#fca5a5;background:#2a1215' : '';
    const badge = isBalju ? '<span style="background:#dc2626;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px">발주</span>' : '<span style="color:#64748b;font-size:10px">주문</span>';
    html += `<tr style="${rowStyle}"><td>${r.date}</td><td>${r.customer}</td><td class="qty">${r.qty}개</td><td style="text-align:center">${badge}</td></tr>`;
  }
  html += `</tbody><tfoot><tr><td colspan="2" style="text-align:right;color:#94a3b8;padding:8px 12px"><strong>${rows.length}건</strong></td><td class="qty" style="border-top:2px solid #3b82f6">${total}개</td><td></td></tr></tfoot></table>`;
  document.getElementById('modalBody').innerHTML = html;
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalBg').classList.remove('show');
}

// 타임라인 점 그리기
function renderTimelines() {
  if (!historyCache) return;
  // 100일 고정 스케일 (왼쪽=100일전, 오른쪽=오늘)
  const today = new Date();
  const day100ago = new Date(today); day100ago.setDate(day100ago.getDate() - 100);
  const range = today - day100ago;
  const recent7 = new Date(today); recent7.setDate(recent7.getDate() - 7);

  for (const r of ITEMS) {
    const tlId = 'tl-' + r.key.replace(/[*|.]/g, '_');
    const el = document.getElementById(tlId);
    if (!el) continue;
    const orders = historyCache.filter(h => h.chisu === r.chisu && h.jaejil === r.jaejil);
    if (!orders.length) { el.style.display = 'none'; continue; }
    let dots = '';
    for (const o of orders) {
      const d = new Date(o.date);
      if (d < day100ago) continue;
      const pct = ((d - day100ago) / range * 94 + 3).toFixed(1);
      const cls = o.type === '발주' ? 'dot balju' : d >= recent7 ? 'dot recent' : 'dot';
      dots += `<div class="${cls}" style="left:${pct}%" title="${o.date} ${o.customer} ${o.qty}개 ${o.type||''}"></div>`;
    }
    el.innerHTML = dots;
  }
}

        const v = (i) => c[i] ? (c[i].v != null ? c[i].v : '') : '';
        historyCache.push({ chisu: String(v(0)), jaejil: String(v(1)), date: String(v(2)), customer: String(v(3)), qty: parseInt(v(4)) || 0, type: String(v(5)) || '주문' });
      }
      renderTimelines();
    } catch(e) { console.error('이력 로드 실패:', e); }
    delete window[cbName];
    document.body.removeChild(script);
  };
  const script = document.createElement('script');
  script.src = url;
  script.onerror = function() { delete window[cbName]; };
  document.body.appendChild(script);
}

// Google Sheets JSONP 로드 (file://에서도 동작 - script 태그 방식)
const SHEET_ID = '1zkyYFiX5MGkGj7cnjhpiPvlzHLwN0CZKMFnjl9tTzqA';
const SHEET_TAB = encodeURIComponent('선생산리스트');

function loadFromSheet(callback) {
  const cbName = '_sheetCb_' + Date.now();
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_TAB}&tqx=responseHandler:${cbName}`;

  window[cbName] = function(response) {
    try {
      const rows = response.table.rows;
      const items = [];
      for (const row of rows) {
        const c = row.c;
        if (!c || !c[0]) continue;
        const v = (i) => c[i] ? (c[i].v != null ? c[i].v : '') : '';
        items.push({
          chisu: String(v(0)), jaejil: String(v(1)), pumok: String(v(2)),
          freq: parseInt(v(3)) || 0,
          total_qty: parseInt(v(4)) || 0,
          avg_qty: parseFloat(v(5)) || 0,
          stock: parseInt(v(6)) || 0,
          stock_ratio: parseInt(v(6)) >= 0 && parseInt(v(4)) > 0 ? Math.round(parseInt(v(6)) / parseInt(v(4)) * 1000) / 10 : parseFloat(v(7)) || 0,
          in_production: v(8) === 'Y',
          score: parseFloat(v(9)) || 0,
          customers: v(10) ? String(v(10)).split(', ').map(n => ({name:n})) : [],
          latest_balju: String(v(11)),
          key: String(v(0)) + '|' + String(v(1))
        });
      }
      callback(items);
    } catch(e) {
      console.error('파싱 실패:', e);
      callback(null);
    }
    // 정리
    delete window[cbName];
    document.body.removeChild(script);
  };

  const script = document.createElement('script');
  script.src = url;
  script.onerror = function() { callback(null); delete window[cbName]; };
  document.body.appendChild(script);
}

loadGraveyardFromSheet(function() {
  loadFromSheet(function(items) {
    if (items) {
      ITEMS = items;
    } else if (typeof DATA_WR !== 'undefined') {
      // Google Sheets 실패 시 로컬 data_wr.js fallback
      ITEMS = DATA_WR;
      showToast('오프라인 모드 - 로컬 데이터 사용');
    } else {
      document.body.innerHTML += '<div style="color:red;padding:40px;font-size:18px">데이터 로드 실패 - 인터넷 연결을 확인하세요</div>';
      return;
    }
    autoRemoveGraveyard();
    autoCleanCompleted();
    syncToServer();  // graveyard 상태를 서버에 저장 (refresh.py 연동)
    populateJaejilSelect();
    render();
    loadHistory();
  });
});
