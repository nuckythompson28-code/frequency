<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Soltri 선생산 관리</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="data_wr.js" onerror="console.log('data_wr.js 없음 - Google Sheets에서 로드')"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

.top-bar{background:linear-gradient(135deg,#1e293b,#334155);padding:16px 24px;border-bottom:2px solid #3b82f6;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:20px;color:#f8fafc}
.top-bar h1 em{font-style:normal;color:#3b82f6}
.top-bar .sub{font-size:12px;color:#94a3b8;margin-top:2px}
.top-bar .actions{display:flex;gap:8px}

.filter-bar{background:#1a2540;border-bottom:1px solid #334155;padding:10px 24px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.fi{display:flex;align-items:center;gap:7px;font-size:12px}
.fi label{color:#94a3b8;white-space:nowrap}
.fi input[type=range]{width:90px;accent-color:#3b82f6;cursor:pointer}
.fi input[type=number]{width:64px;background:#334155;border:1px solid #475569;color:#e2e8f0;border-radius:4px;padding:3px 7px;font-size:12px}
.fv{font-weight:800;color:#3b82f6;min-width:28px;text-align:right}
.filter-div{width:1px;height:20px;background:#334155}
.btn-sel{background:#0f2a1a;border:1px solid #22c55e;color:#4ade80;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-weight:600}
.btn-sel:hover{background:#1a3d28}
.btn-clr{background:#2a1f0f;border:1px solid #f59e0b;color:#fbbf24;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-weight:600}
.btn-clr:hover{background:#3d2e10}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-print{background:#059669;color:#fff}
.btn-print:hover{background:#047857}
.btn-reset{background:#475569;color:#e2e8f0}
.btn-reset:hover{background:#64748b}
.btn-undo{background:#f59e0b;color:#1a1a1a}
.btn-undo:hover{background:#d97706}
.btn-refresh{background:#3b82f6;color:#fff}
.btn-refresh:hover{background:#2563eb}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px}
.stat{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #334155;text-align:center}
.stat .num{font-size:28px;font-weight:800}
.stat .lbl{font-size:11px;color:#94a3b8;margin-top:2px}
.stat.danger .num{color:#ef4444}
.stat.warn .num{color:#f59e0b}
.stat.ok .num{color:#22c55e}
.stat.info .num{color:#3b82f6}

.section{padding:8px 24px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;user-select:none}
.section-header h2{font-size:16px;font-weight:700}
.section-header .badge{padding:2px 10px;border-radius:10px;font-size:13px;font-weight:700}
.section-header .toggle{font-size:12px;color:#64748b;margin-left:auto}

.section.active .section-header h2{color:#ef4444}
.section.active .badge{background:#ef444433;color:#f87171}
.section.graveyard .section-header h2{color:#64748b}
.section.graveyard .badge{background:#47556933;color:#94a3b8}
.section.stocked .section-header h2{color:#22c55e}
.section.stocked .badge{background:#22c55e33;color:#4ade80}
.section.producing .section-header h2{color:#3b82f6}
.section.producing .badge{background:#3b82f633;color:#60a5fa}
.section.completed .section-header h2{color:#a78bfa}
.section.completed .badge{background:#7c3aed33;color:#c4b5fd}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:8px}

.card{background:#1e293b;border:2px solid #334155;border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{border-color:#3b82f6;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.card.sent{opacity:.35;pointer-events:none;border-color:#334155}
.card.sending{animation:sendAnim .4s ease-out forwards}

@keyframes sendAnim{
  0%{transform:scale(1);opacity:1}
  50%{transform:scale(.95);opacity:.5}
  100%{transform:scale(.9)translateY(10px);opacity:0}
}
@keyframes reviveAnim{
  0%{transform:scale(.9);opacity:0}
  100%{transform:scale(1);opacity:1}
}

.card .row1{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card .chisu{font-size:20px;font-weight:800;flex:1}
.card .jaejil-badge{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;color:#fff}
.jaejil-CN10{background:#b8860b}
.jaejil-RS40{background:#0d9488}
.jaejil-CM20{background:#6b7280}

.card .row2{display:flex;gap:16px;font-size:13px;color:#94a3b8}
.card .row2 strong{color:#e2e8f0}

.card .stock-bar{margin-top:8px;height:6px;background:#334155;border-radius:3px;overflow:hidden}
.card .stock-fill{height:100%;border-radius:3px;transition:width .3s}
.stock-fill.danger{background:#ef4444}
.stock-fill.warn{background:#f59e0b}
.stock-fill.ok{background:#22c55e}

.card .stock-label{display:flex;justify-content:space-between;font-size:11px;margin-top:3px;color:#64748b}
.card .stock-label .stock-num{font-weight:800;font-size:14px}
.card .timeline{position:relative;height:8px;background:#1e293b;border-radius:4px;margin-top:6px;border:1px solid #334155}
.card .timeline .dot{position:absolute;width:5px;height:5px;border-radius:50%;background:#3b82f6;top:50%;transform:translateY(-50%)}
.card .timeline .dot.recent{background:#f59e0b}
.card .timeline .dot.balju{background:#ef4444;width:7px;height:7px;z-index:2;box-shadow:0 0 4px #ef4444}
.card .timeline-label{display:flex;justify-content:space-between;font-size:8px;color:#475569;margin-top:1px}
.card .timeline-label .mid{position:absolute;left:50%;transform:translateX(-50%)}
.card .stock-label .stock-num.danger{color:#ef4444}
.card .stock-label .stock-num.warn{color:#f59e0b}
.card .stock-label .stock-num.ok{color:#22c55e}

.card .action-hint{position:absolute;top:0;right:0;bottom:0;width:60px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:20px;background:linear-gradient(90deg,transparent,#ef444444)}
.card:hover .action-hint{opacity:1}
.card .card-btns{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .2s;z-index:10}
.card:hover .card-btns{opacity:1}
.card .card-btn{background:#334155;border:1px solid #475569;color:#94a3b8;font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer}
.card .card-btn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6}
.card .card-btn.excel{color:#22c55e;border-color:#22c55e44}
.card .card-btn.excel:hover{background:#22c55e;color:#fff}
.card .card-btn.excel.selected{background:#22c55e;color:#fff;opacity:1}

.card-grave .action-hint{background:linear-gradient(90deg,transparent,#22c55e44)}

.empty-msg{text-align:center;padding:40px;color:#475569;font-size:14px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;padding:10px 24px;border-radius:8px;font-size:13px;color:#e2e8f0;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#1e293b;border:2px solid #3b82f6;border-radius:12px;width:90%;max-width:600px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #334155}
.modal-header h3{font-size:18px;color:#f8fafc}
.modal-header .close-btn{background:none;border:none;color:#94a3b8;font-size:24px;cursor:pointer}
.modal-header .close-btn:hover{color:#fff}
.modal-body{overflow-y:auto;padding:0}
.history-table{width:100%;border-collapse:collapse;font-size:13px}
.history-table th{background:#334155;color:#e2e8f0;padding:8px 12px;text-align:left;position:sticky;top:0;font-size:12px}
.history-table td{padding:8px 12px;border-bottom:1px solid #1e293b;color:#cbd5e1}
.history-table tr:nth-child(even){background:#162032}
.history-table tr:hover{background:#1e3a5f}
.history-table .qty{text-align:right;font-weight:700;color:#f59e0b}
.modal-loading{padding:40px;text-align:center;color:#64748b}
.history-tip{padding:8px 16px;font-size:11px;color:#64748b;border-top:1px solid #334155;text-align:center}

@media print{
  .no-print{display:none!important}
  body{background:#fff;color:#1a1a1a}
  .top-bar{background:#fff;border-bottom:2px solid #1e3a5f;position:static}
  .top-bar h1{color:#1e3a5f}
  .stat{border-color:#ddd}
  .stat .num{color:#1a1a1a!important}
  .card{border-color:#ddd;break-inside:avoid}
  .section.graveyard{display:none}
  .card .chisu{color:#1a1a1a}
  .card .row2{color:#666}
  .card .row2 strong{color:#1a1a1a}
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1><em>Soltri</em> W/R 선생산 관리</h1>
    <div class="sub">100일간 10회 이상 반복 주문 · 총량 500개 이하 · 재고 30% 미만 · 7일내 미생산 품목</div>
  </div>
  <div class="actions no-print">
    <button class="btn btn-refresh" onclick="refreshCheck()">리프레시</button>
    <button class="btn" style="background:#22c55e;color:#fff;display:none" onclick="downloadExcel()" id="btnExcel">엑셀 다운로드 (<span id="excelCount">0</span>)</button>
    <button class="btn btn-undo" onclick="undoLast()" id="btnUndo" style="display:none">되돌리기</button>
    <button class="btn btn-reset" onclick="resetAll()">초기화</button>
    <button class="btn btn-print" onclick="window.print()">인쇄</button>
  </div>
</div>

<div class="filter-bar">
  <div class="fi"><label>주문횟수 ≥</label>
    <input type="range" id="fFreq" min="1" max="50" value="10" oninput="applyFilter()">
    <span class="fv" id="fFreqVal">10</span><span style="color:#64748b;font-size:11px">회</span>
  </div>
  <div class="filter-div"></div>
  <div class="fi"><label>재고율 ≤</label>
    <input type="range" id="fStock" min="0" max="100" value="30" oninput="applyFilter()">
    <span class="fv" id="fStockVal">30</span><span style="color:#64748b;font-size:11px">%</span>
  </div>
  <div class="filter-div"></div>
  <div class="fi"><label>점수 ≥</label>
    <input type="range" id="fScore" min="0" max="100" value="0" oninput="applyFilter()">
    <span class="fv" id="fScoreVal">0</span>
  </div>
  <div class="filter-div"></div>
  <div class="fi"><label>총량 ≤</label>
    <input type="number" id="fQty" min="1" max="9999" value="500" oninput="applyFilter()">
    <span style="color:#64748b;font-size:11px">개</span>
  </div>
  <div class="filter-div"></div>
  <button class="btn-sel" onclick="selectAllActive()">전체 선택 →엑셀</button>
  <button class="btn-clr" onclick="clearExcel()">선택 해제</button>
  <span id="filterCount" style="font-size:11px;color:#64748b;margin-left:4px"></span>
</div>

<div class="stats" id="stats"></div>

<div class="section active" id="secActive">
  <div class="section-header" onclick="toggleSection('active')">
    <h2>선생산 필요</h2>
    <span class="badge" id="badgeActive">0</span>
    <span class="toggle" id="toggleActive">▼</span>
  </div>
  <div class="grid" id="gridActive"></div>
</div>

<div class="section graveyard" id="secGrave">
  <div class="section-header" onclick="toggleSection('grave')">
    <h2>생산지시 중</h2>
    <span class="badge" id="badgeGrave">0</span>
    <span class="toggle" id="toggleGrave">▼</span>
  </div>
  <div class="grid" id="gridGrave"></div>
</div>

<div class="section completed" id="secCompleted">
  <div class="section-header" onclick="toggleSection('completed')">
    <h2>생산지시 완료</h2>
    <span class="badge" id="badgeCompleted">0</span>
    <span class="toggle" id="toggleCompleted">▼</span>
  </div>
  <div class="grid" id="gridCompleted"></div>
</div>

<div class="section stocked" id="secStocked">
  <div class="section-header" onclick="toggleSection('stocked')">
    <h2>재고 충분 (생산 완료)</h2>
    <span class="badge" id="badgeStocked">0</span>
    <span class="toggle" id="toggleStocked">▶</span>
  </div>
  <div class="grid" id="gridStocked" style="display:none"></div>
</div>

<div class="section producing" id="secProd">
  <div class="section-header" onclick="toggleSection('prod')">
    <h2>이미 생산중 (7일 내 가공이력)</h2>
    <span class="badge" id="badgeProd">0</span>
    <span class="toggle" id="toggleProd">▶</span>
  </div>
  <div class="grid" id="gridProd" style="display:none"></div>
</div>

<div class="section" id="secOrphan" style="display:none">
  <div class="section-header" onclick="toggleSection('orphan')" style="cursor:pointer">
    <h2 style="color:#f59e0b">&#x26A0; 추적 불가 품목</h2>
    <span class="badge" id="badgeOrphan" style="background:#f59e0b33;color:#fbbf24">0</span>
    <span class="toggle" id="toggleOrphan">▼</span>
  </div>
  <div id="gridOrphan"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">주문 이력</h3>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-loading">로딩중...</div>
    </div>
  </div>
</div>

<script>
let ITEMS = [];
let excelList = new Set();  // 엑셀 내보낼 품목 키

let filterFreq = 5, filterStock = 30, filterScore = 0, filterQty = 500;

function applyFilter() {
  filterFreq  = parseInt(document.getElementById('fFreq').value)  || 1;
  filterStock = parseInt(document.getElementById('fStock').value) || 0;
  filterScore = parseInt(document.getElementById('fScore').value) || 0;
  filterQty   = parseInt(document.getElementById('fQty').value)   || 9999;
  document.getElementById('fFreqVal').textContent  = filterFreq;
  document.getElementById('fStockVal').textContent = filterStock;
  document.getElementById('fScoreVal').textContent = filterScore;
  render();
}

function getActiveFiltered() {
  const isStocked = r => r.stock >= 0 && r.stock_ratio > filterStock;
  return ITEMS.filter(r =>
    !r.in_production && !isStocked(r) && !isInGrave(r.key) && !(r.key in completed) &&
    r.freq >= filterFreq && r.total_qty <= filterQty && r.score >= filterScore
  );
}

function selectAllActive() {
  getActiveFiltered().forEach(r => excelList.add(r.key));
  document.getElementById('excelCount').textContent = excelList.size;
  document.getElementById('btnExcel').style.display = excelList.size > 0 ? '' : 'none';
  render();
}

function clearExcel() {
  excelList.clear();
  document.getElementById('excelCount').textContent = 0;
  document.getElementById('btnExcel').style.display = 'none';
  render();
}

const STORAGE_KEY = 'soltri_graveyard';
const COMPLETED_KEY = 'soltri_completed';
const ARCHIVED_KEY = 'soltri_archived';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwGhEtnGrHKXr3dVg_9db_kyeWAH6gS4pu4NNk09H8X6Rsr2dDb4B50BLMG_G20K7s/exec';
let graveyard = {};
let completed = {};
let archived = {};  // 재고 충분으로 졸업한 이력 보존
let undoStack = [];

function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(graveyard));
  localStorage.setItem(COMPLETED_KEY, JSON.stringify(completed));
  localStorage.setItem(ARCHIVED_KEY, JSON.stringify(archived));
}

function syncToSheet(type) {
  if (!APPS_SCRIPT_URL) return;
  const data = encodeURIComponent(JSON.stringify(type === 'completed' ? completed : graveyard));
  const cbName = '_sync_' + Date.now();
  window[cbName] = function() { delete window[cbName]; try { document.body.removeChild(sc); } catch(e){} };
  const sc = document.createElement('script');
  sc.src = `${APPS_SCRIPT_URL}?action=save&type=${type}&data=${data}&callback=${cbName}`;
  sc.onerror = () => { delete window[cbName]; };
  document.body.appendChild(sc);
}

function syncToServer() {
  // graveyard.json을 로컬 서버에 저장 (refresh.py 연동용)
  try {
    fetch('/graveyard.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(graveyard)
    }).catch(() => {});
  } catch(e) {}
}

function save() {
  saveLocal();
  syncToSheet('graveyard');
  syncToServer();
}
function saveCompleted() {
  saveLocal();
  syncToSheet('completed');
}

function loadGraveyardFromSheet(callback) {
  if (!APPS_SCRIPT_URL) {
    graveyard = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    completed = JSON.parse(localStorage.getItem(COMPLETED_KEY) || '{}');
    archived = JSON.parse(localStorage.getItem(ARCHIVED_KEY) || '{}');
    callback(); return;
  }
  const cbName = '_loadGrave_' + Date.now();
  window[cbName] = function(data) {
    graveyard = data.graveyard || {};
    completed = data.completed || {};
    saveLocal();
    delete window[cbName];
    try { document.body.removeChild(sc); } catch(e){}
    callback();
  };
  const sc = document.createElement('script');
  sc.src = `${APPS_SCRIPT_URL}?action=load&callback=${cbName}`;
  sc.onerror = function() {
    graveyard = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    completed = JSON.parse(localStorage.getItem(COMPLETED_KEY) || '{}');
    archived = JSON.parse(localStorage.getItem(ARCHIVED_KEY) || '{}');
    delete window[cbName];
    callback();
  };
  document.body.appendChild(sc);
}

function isInGrave(key) { return key in graveyard; }
function graveKeys() { return Object.keys(graveyard); }

// 리프레시: JSON 다시 읽고, 무덤 품목 중 재고가 보냈을때보다 줄었으면 복귀
function refreshCheck() {
  loadFromSheet(function(newData) {
    if (!newData) { showToast('데이터 로드 실패'); return; }
    ITEMS = newData;
    showToast('데이터 갱신 완료');
    render();
  });
}

function getStockClass(r) {
  if (r.stock < 0) return 'ok';
  if (r.stock_ratio <= 10) return 'danger';
  if (r.stock_ratio <= 20) return 'warn';
  return 'ok';
}

function makeCard(r, type) {
  const sc = getStockClass(r);
  const stockW = r.stock >= 0 ? Math.min(100, r.stock_ratio) : 50;
  const stockDisplay = r.stock >= 0 ? r.stock + '개' : '-';
  const hint = type === 'active' ? '▶' : type === 'grave' ? '◀' : type === 'prod' ? '▶' : '';
  const cardClass = type === 'grave' ? 'card card-grave' : 'card';
  const onclick = type === 'active' ? `sendToGrave('${r.key}')` : type === 'grave' ? `reviveFromGrave('${r.key}')` : type === 'prod' ? `sendToGrave('${r.key}')` : '';
  const clickAttr = onclick ? `onclick="${onclick}"` : '';
  const excelSel = excelList.has(r.key) ? ' selected' : '';
  const cardBtns = `<div class="card-btns">
    <span class="card-btn" onclick="event.stopPropagation();showHistory('${r.key}','${r.chisu}','${r.jaejil}')">이력</span>
    ${(type === 'active' || type === 'grave' || type === 'prod') ? `<span class="card-btn excel${excelSel}" onclick="event.stopPropagation();toggleExcel('${r.key}')" id="xl-${r.key.replace(/[*|.]/g,'_')}">엑셀</span>` : ''}
    ${type === 'grave' ? `<span class="card-btn" style="color:#a78bfa;border-color:#7c3aed44" onclick="event.stopPropagation();markCompleted('${r.key}')">완료</span>` : ''}
  </div>`;
  const pointerStyle = '';

  return `<div class="${cardClass}" ${clickAttr} style="${pointerStyle}" id="card-${r.key.replace(/[*|.]/g,'_')}">
    ${cardBtns}
    <div class="row1">
      <span class="chisu">${r.chisu}</span>
      <span class="jaejil-badge jaejil-${r.jaejil}">${r.jaejil}</span>
    </div>
    <div class="row2">
      <span>주문 <strong>${r.freq}회</strong></span>
      <span>총량 <strong>${r.total_qty}개</strong></span>
      <span>평균 <strong>${r.avg_qty}/회</strong></span>
    </div>

}

function render() {

  // 재고율 기준은 필터값 사용
  const isStocked = r => r.stock >= 0 && r.stock_ratio > filterStock;
  const itemKeys = new Set(ITEMS.map(r => r.key));

  // ── 시나리오 3: graveyard에 있는 품목은 in_production 무시 ──
  // (이미 우리가 추적 중이므로 "이미 생산중"에 중복 표시 방지)
  ITEMS.forEach(r => {
    if (isInGrave(r.key) || r.key in completed) {
      r._origInProd = r.in_production;
      r.in_production = false;
    }
  });

  // ── 시나리오 2: completed → 재고 충분 이동 시 이력 보존 (archived) ──
  let autoMoved = 0;
  for (const key of Object.keys(completed)) {
    const item = ITEMS.find(r => r.key === key);
    if (item && isStocked(item)) {
      archived[key] = {
        graveDate: completed[key].graveDate,
        completedDate: completed[key].completedDate,
        archivedDate: new Date().toISOString().slice(0, 10),
        chisu: item.chisu,
        jaejil: item.jaejil
      };
      delete completed[key];
      autoMoved++;
    }
  }
  if (autoMoved > 0) {
    saveCompleted();
    showToast(`재고 충족 ${autoMoved}개 → 재고 충분으로 자동 이동 (이력 보존됨)`);
  }

  // ── 시나리오 1: orphan 감지 (graveyard/completed에 있는데 ITEMS에 없는 품목) ──
  const orphanGrave = [];
  for (const [key, date] of Object.entries(graveyard)) {
    if (!itemKeys.has(key)) {
      orphanGrave.push({ key, date, type: '생산지시 중', source: 'graveyard' });
    }
  }
  const orphanCompleted = [];
  for (const [key, info] of Object.entries(completed)) {
    if (!itemKeys.has(key)) {
      orphanCompleted.push({ key, date: info.graveDate, completedDate: info.completedDate, type: '생산지시 완료', source: 'completed' });
    }
  }
  const orphans = [...orphanGrave, ...orphanCompleted];

  const activeItems = ITEMS.filter(r =>
    !r.in_production && !isStocked(r) && !isInGrave(r.key) && !(r.key in completed) &&
    r.freq >= filterFreq && r.total_qty <= filterQty && r.score >= filterScore
  );
  const graveItems = ITEMS.filter(r => isInGrave(r.key) && !isStocked(r));
  graveItems.forEach(r => { r._graveDate = graveyard[r.key] || ''; });
  const completedItems = ITEMS.filter(r => r.key in completed && !isStocked(r));
  completedItems.forEach(r => { r._completedDate = completed[r.key].completedDate || ''; r._graveDate = completed[r.key].graveDate || ''; });
  const stockedItems = ITEMS.filter(r => isStocked(r) && !isInGrave(r.key) && !(r.key in completed));
  // 생산중 = 7일내 가공이력 있고 재고 아직 부족 (graveyard, completed 제외)
  const prodItems = ITEMS.filter(r => r.in_production && !isStocked(r) && !isInGrave(r.key) && !(r.key in completed));

  document.getElementById('gridActive').innerHTML = activeItems.length
    ? activeItems.map(r => makeCard(r, 'active')).join('')
    : '<div class="empty-msg">모든 품목 생산지시 중!</div>';
  document.getElementById('gridGrave').innerHTML = graveItems.length
    ? graveItems.map(r => makeCard(r, 'grave')).join('')
    : '<div class="empty-msg">아직 없음</div>';
  document.getElementById('gridCompleted').innerHTML = completedItems.length
    ? completedItems.map(r => makeCard(r, 'completed')).join('')
    : '<div class="empty-msg">아직 없음</div>';
  document.getElementById('badgeCompleted').textContent = completedItems.length;
  document.getElementById('gridStocked').innerHTML = stockedItems.length
    ? stockedItems.map(r => makeCard(r, 'stocked')).join('')
    : '<div class="empty-msg">아직 없음</div>';
  document.getElementById('gridProd').innerHTML = prodItems.map(r => makeCard(r, 'prod')).join('');

  // ── orphan 섹션 렌더링 ──
  const orphanEl = document.getElementById('secOrphan');
  const orphanGrid = document.getElementById('gridOrphan');
  if (orphans.length > 0) {
    orphanEl.style.display = '';
    document.getElementById('badgeOrphan').textContent = orphans.length;
    orphanGrid.innerHTML = orphans.map(o => {
      const parts = o.key.split('|');
      const chisu = parts[0] || o.key;
      const jaejil = parts[1] || '';
      const dateStr = o.date ? String(o.date).slice(0, 10) : '';
      return `<div style="background:#1e293b;border:2px solid #f59e0b44;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <span style="font-weight:800;font-size:16px">${chisu}</span>
          <span style="padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:#47556933;color:#94a3b8;margin-left:8px">${jaejil}</span>
          <div style="font-size:11px;color:#94a3b8;margin-top:4px">
            ${o.type} (지시일: ${dateStr})${o.completedDate ? ' / 완료일: ' + o.completedDate : ''}
          </div>
          <div style="font-size:10px;color:#f59e0b;margin-top:2px">데이터에서 빠짐 (freq&lt;10 또는 total&gt;1000)</div>
        </div>
        <button onclick="removeOrphan('${o.key}','${o.source}')" style="background:#ef444433;border:1px solid #ef4444;color:#f87171;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700">제거</button>
      </div>`;
    }).join('');
  } else {
    orphanEl.style.display = 'none';
  }

  document.getElementById('badgeActive').textContent = activeItems.length;
  document.getElementById('badgeGrave').textContent = graveItems.length;
  document.getElementById('badgeStocked').textContent = stockedItems.length;
  document.getElementById('badgeProd').textContent = prodItems.length;

  // stats
  const dangerCount = activeItems.filter(r => r.stock_ratio <= 10).length;
  const warnCount = activeItems.filter(r => r.stock_ratio > 10 && r.stock_ratio <= 20).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat danger"><div class="num">${dangerCount}</div><div class="lbl">재고 10% 이하</div></div>
    <div class="stat warn"><div class="num">${warnCount}</div><div class="lbl">재고 20% 이하</div></div>
    <div class="stat ok"><div class="num">${graveItems.length}</div><div class="lbl">생산지시 중</div></div>
    <div class="stat info"><div class="num">${stockedItems.length}</div><div class="lbl">재고 충분</div></div>
  `;

  document.getElementById('btnUndo').style.display = undoStack.length ? '' : 'none';
  const fc = document.getElementById('filterCount');
  if (fc) fc.textContent = `필터 결과 ${activeItems.length}개`;

  if (typeof renderTimelines === 'function') renderTimelines();
}

function sendToGrave(key) {
  if (isInGrave(key)) return;
  graveyard[key] = new Date().toISOString();  // "2026-03-20T09:30:00.000Z" 시간까지 저장
  undoStack.push({ action: 'send', key });
  save();
  showToast('생산지시 중 처리됨');
  render();
}

function reviveFromGrave(key) {
  const oldDate = graveyard[key];
  delete graveyard[key];
  undoStack.push({ action: 'revive', key, oldDate });
  save();
  showToast('선생산 리스트로 복귀');
  render();
}

function markCompleted(key) {
  if (!graveyard[key]) return;
  const graveDate = String(graveyard[key]).slice(0, 10);
  const today = new Date().toISOString().slice(0, 10);
  completed[key] = { graveDate: graveDate, completedDate: today };
  delete graveyard[key];
  undoStack.push({ action: 'complete', key, graveDate });
  save();
  saveCompleted();
  showToast('생산지시 완료 처리됨');
  render();
}

function undoLast() {
  if (!undoStack.length) return;
  const last = undoStack.pop();
  if (last.action === 'send') {
    delete graveyard[last.key];
  } else if (last.action === 'complete') {
    // 완료 → 생산지시 중으로 복귀
    graveyard[last.key] = last.graveDate || new Date().toISOString();
    delete completed[last.key];
    saveCompleted();
  } else {
    graveyard[last.key] = last.oldDate || '';
  }
  save();
  showToast('되돌리기 완료');
  render();
}

function autoRemoveGraveyard() {
  let removed = 0;
  for (const key of Object.keys(graveyard)) {
    const item = ITEMS.find(r => r.key === key);
    const graveDate = String(graveyard[key]).slice(0, 10);
    if (item && item.latest_balju && graveDate && item.latest_balju >= graveDate) {
      completed[key] = { graveDate, completedDate: item.latest_balju };
      delete graveyard[key];
      removed++;
    }
  }
  if (removed > 0) {
    save();
    saveCompleted();
    showToast(`발주 확인 ${removed}개 → 생산지시 완료로 이동`);
  }
}

function autoCleanCompleted() {
  let removed = 0;
  for (const key of Object.keys(completed)) {
    const item = ITEMS.find(r => r.key === key);
    if (item && item.stock >= 0 && item.stock_ratio > filterStock) {
      delete completed[key];
      removed++;
    }
  }
  if (removed > 0) {
    saveCompleted();
    showToast(`재고 충족 ${removed}개 → 생산지시 완료에서 자동 제거`);
  }
}

function removeOrphan(key, source) {
  if (source === 'graveyard') {
    delete graveyard[key];
    save();
  } else {
    delete completed[key];
    saveCompleted();
  }
  showToast('추적 불가 품목 제거됨');
  render();
}

function resetAll() {
  if (!confirm('생산지시 기록을 모두 초기화할까요?')) return;
  graveyard = {};
  undoStack = [];
  save();
  showToast('초기화 완료');
  render();
}

function toggleExcel(key) {
  if (excelList.has(key)) excelList.delete(key);
  else excelList.add(key);
  document.getElementById('excelCount').textContent = excelList.size;
  document.getElementById('btnExcel').style.display = excelList.size > 0 ? '' : 'none';
  render();

// 재질 → 품목/재질 코드 변환
function toJaejilCode(jaejil) {
  return 'W/' + jaejil;
}

// 치수 → 발주서 형식 (내경*외경*높이 → 외경 x 내경 x 높이)
function toBaljuChisu(chisu) {
  const p = chisu.split('*');
  if (p.length === 3) return p[1] + ' x ' + p[0] + ' x ' + p[2];
  return chisu.replace(/\*/g, ' x ');
}

function toggleSection(name) {
  const map = { active: 'gridActive', grave: 'gridGrave', completed: 'gridCompleted', stocked: 'gridStocked', prod: 'gridProd' };
  const toggleMap = { active: 'toggleActive', grave: 'toggleGrave', completed: 'toggleCompleted', stocked: 'toggleStocked', prod: 'toggleProd' };
  const grid = document.getElementById(map[name]);
  const toggle = document.getElementById(toggleMap[name]);
  if (grid.style.display === 'none') {
    grid.style.display = '';
    toggle.textContent = '▼';
  } else {
    grid.style.display = 'none';
    toggle.textContent = '▶';
  }
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1500);
}

// 주문이력 모달
let historyCache = null;
const HISTORY_TAB = encodeURIComponent('주문이력');

function showHistory(key, chisu, jaejil) {
  document.getElementById('modalTitle').textContent = chisu + ' / ' + jaejil + ' 주문이력';
  document.getElementById('modalBody').innerHTML = '<div class="modal-loading">로딩중...</div>';
  document.getElementById('modalBg').classList.add('show');

  if (historyCache) {
    renderHistory(key, chisu, jaejil);
    return;
  }

  const cbName = '_histCb_' + Date.now();
  const url = `https://docs.google.com/spreadsheets/d/1MsmVKtz5NTxIIoj3efXYPLEhL3GaONW5LAlRNjKk7s0/gviz/tq?sheet=${HISTORY_TAB}&tqx=responseHandler:${cbName}`;

  window[cbName] = function(response) {
    try {
      historyCache = [];
      for (const row of response.table.rows) {
        const c = row.c;
        if (!c || !c[0]) continue;
        const v = (i) => c[i] ? (c[i].v != null ? c[i].v : '') : '';
        historyCache.push({ chisu: String(v(0)), jaejil: String(v(1)), date: String(v(2)), customer: String(v(3)), qty: parseInt(v(4)) || 0, type: String(v(5)) || '주문' });
      }
      renderHistory(key, chisu, jaejil);
    } catch(e) {
      document.getElementById('modalBody').innerHTML = '<div class="modal-loading">이력 로드 실패</div>';
    }
    delete window[cbName];
    document.body.removeChild(script);
  };
  const script = document.createElement('script');
  script.src = url;
  script.onerror = function() { document.getElementById('modalBody').innerHTML = '<div class="modal-loading">이력 로드 실패</div>'; delete window[cbName]; };
  document.body.appendChild(script);
}

function renderHistory(key, chisu, jaejil) {
  const rows = historyCache.filter(h => h.chisu === chisu && h.jaejil === jaejil);
  rows.sort((a, b) => b.date.localeCompare(a.date));

  if (rows.length === 0) {
    document.getElementById('modalBody').innerHTML = '<div class="modal-loading">이력 없음</div>';
    return;
  }

  let total = 0;
  let html = '<table class="history-table"><thead><tr><th>주문일자</th><th>거래처</th><th>수량</th><th>구분</th></tr></thead><tbody>';
  for (const r of rows) {
    total += r.qty;
    const isBalju = r.type === '발주';
    const rowStyle = isBalju ? 'color:#fca5a5;background:#2a1215' : '';
    const badge = isBalju ? '<span style="background:#dc2626;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px">발주</span>' : '<span style="color:#64748b;font-size:10px">주문</span>';
    html += `<tr style="${rowStyle}"><td>${r.date}</td><td>${r.customer}</td><td class="qty">${r.qty}개</td><td style="text-align:center">${badge}</td></tr>`;
  }
  html += `</tbody><tfoot><tr><td colspan="2" style="text-align:right;color:#94a3b8;padding:8px 12px"><strong>${rows.length}건</strong></td><td class="qty" style="border-top:2px solid #3b82f6">${total}개</td><td></td></tr></tfoot></table>`;
  document.getElementById('modalBody').innerHTML = html;
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalBg').classList.remove('show');
}

// 타임라인 점 그리기
function renderTimelines() {
  if (!historyCache) return;
  // 100일 고정 스케일 (왼쪽=100일전, 오른쪽=오늘)
  const today = new Date();
  const day100ago = new Date(today); day100ago.setDate(day100ago.getDate() - 100);
  const range = today - day100ago;
  const recent7 = new Date(today); recent7.setDate(recent7.getDate() - 7);

  for (const r of ITEMS) {
    const tlId = 'tl-' + r.key.replace(/[*|.]/g, '_');
    const el = document.getElementById(tlId);
    if (!el) continue;
    const orders = historyCache.filter(h => h.chisu === r.chisu && h.jaejil === r.jaejil);
    if (!orders.length) { el.style.display = 'none'; continue; }
    let dots = '';
    for (const o of orders) {
      const d = new Date(o.date);
      if (d < day100ago) continue;
      const pct = ((d - day100ago) / range * 94 + 3).toFixed(1);
      const cls = o.type === '발주' ? 'dot balju' : d >= recent7 ? 'dot recent' : 'dot';
      dots += `<div class="${cls}" style="left:${pct}%" title="${o.date} ${o.customer} ${o.qty}개 ${o.type||''}"></div>`;
    }
    el.innerHTML = dots;
  }
}

// 페이지 로드시 이력도 함께 가져와서 타임라인 렌더링
function loadHistory() {
  const cbName = '_histBg_' + Date.now();
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${HISTORY_TAB}&tqx=responseHandler:${cbName}`;
  window[cbName] = function(response) {
    try {
      historyCache = [];
      for (const row of response.table.rows) {
        const c = row.c;
        if (!c || !c[0]) continue;
        const v = (i) => c[i] ? (c[i].v != null ? c[i].v : '') : '';
        historyCache.push({ chisu: String(v(0)), jaejil: String(v(1)), date: String(v(2)), customer: String(v(3)), qty: parseInt(v(4)) || 0, type: String(v(5)) || '주문' });
      }
      renderTimelines();
    } catch(e) { console.error('이력 로드 실패:', e); }
    delete window[cbName];
    document.body.removeChild(script);
  };
  const script = document.createElement('script');
  script.src = url;
  script.onerror = function() { delete window[cbName]; };
  document.body.appendChild(script);
}

// Google Sheets JSONP 로드 (file://에서도 동작 - script 태그 방식)
const SHEET_ID = '1MsmVKtz5NTxIIoj3efXYPLEhL3GaONW5LAlRNjKk7s0';
const SHEET_TAB = encodeURIComponent('선생산리스트');

function loadFromSheet(callback) {
  const cbName = '_sheetCb_' + Date.now();
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_TAB}&tqx=responseHandler:${cbName}`;

  window[cbName] = function(response) {
    try {
      const rows = response.table.rows;
      const items = [];
      for (const row of rows) {
        const c = row.c;
        if (!c || !c[0]) continue;
        const v = (i) => c[i] ? (c[i].v != null ? c[i].v : '') : '';
        items.push({
          chisu: String(v(0)), jaejil: String(v(1)), pumok: String(v(2)),
          freq: parseInt(v(3)) || 0,
          total_qty: parseInt(v(4)) || 0,
          avg_qty: parseFloat(v(5)) || 0,
          stock: parseInt(v(6)) || 0,
          stock_ratio: parseInt(v(6)) >= 0 && parseInt(v(4)) > 0 ? Math.round(parseInt(v(6)) / parseInt(v(4)) * 1000) / 10 : parseFloat(v(7)) || 0,
          in_production: v(8) === 'Y',
          score: parseFloat(v(9)) || 0,
          customers: v(10) ? String(v(10)).split(', ').map(n => ({name:n})) : [],
          latest_balju: String(v(11)),
          key: String(v(0)) + '|' + String(v(1))
        });
      }
      callback(items);
    } catch(e) {
      console.error('파싱 실패:', e);
      callback(null);
    }
    // 정리
    delete window[cbName];
    document.body.removeChild(script);
  };

  const script = document.createElement('script');
  script.src = url;
  script.onerror = function() { callback(null); delete window[cbName]; };
  document.body.appendChild(script);
}
